        const normalizeYear = (yearStr) => {
            if (!yearStr) return '';
            const bnDigits = ['০', '১', '২', '৩', '৪', '৫', '৬', '৭', '৮', '৯'];
            let str = String(yearStr);
            for (let i = 0; i < 10; i++) str = str.replace(new RegExp(bnDigits[i], 'g'), i);
            return str;
        };

            bn: ['বৈশাখ', 'জ্যৈষ্ঠ', 'আষাঢ়', 'শ্রাবণ', 'ভাদ্র', 'আশ্বিন', 'কার্তিক', 'অগ্রহায়ণ', 'পৌষ', 'মাঘ', 'ফাল্গুন', 'চৈত্র'],
            en: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December']
        };

        let audioCtx;
        function playSound(type) {
            try {
                audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
                if (type === 'error' || type === 'delete') {
                    const playTone = (freq, start, duration) => {
                        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime + start);
                        gain.gain.setValueAtTime(0, audioCtx.currentTime + start);
                        gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + start + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + start + duration);
                        osc.start(audioCtx.currentTime + start); osc.stop(audioCtx.currentTime + start + duration);
                    };
                    playTone(440, 0, 0.2); playTone(349.23, 0.2, 0.3); 
                } else if (type === 'success') {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } else {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                }
            } catch(e) { console.error("Audio error", e); }
        }

        function customConfirm(message, type = 'warning') {
            return new Promise((resolve) => {
                playSound(type === 'delete' ? 'delete' : 'error');
                const colors = { delete: { bg: 'bg-red-50', border: 'border-red-500', btn: 'bg-red-500 hover:bg-red-600', icon: 'text-red-500' }, warning: { bg: 'bg-yellow-50', border: 'border-yellow-500', btn: 'bg-yellow-500 hover:bg-yellow-600', icon: 'text-yellow-500' }, info: { bg: 'bg-blue-50', border: 'border-blue-500', btn: 'bg-blue-500 hover:bg-blue-600', icon: 'text-blue-500' } };
                const c = colors[type] || colors.warning;
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 bg-black bg-opacity-50 z-[200] flex items-center justify-center p-4 fade-in';
                modal.innerHTML = `
                    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm text-center border-t-4 ${c.border}">
                        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full ${c.bg} mb-4">
                            <svg class="w-6 h-6 ${c.icon}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>

                        <div class="flex gap-3">

                            <button id="confirmBtn" class="flex-1 ${c.btn} text-white p-2 rounded-lg font-bold">নিশ্চিত করুন</button>
                        </div>
                    </div>`;
                document.body.appendChild(modal);
                modal.querySelector('#cancelBtn').onclick = () => { modal.remove(); resolve(false); };
                modal.querySelector('#confirmBtn').onclick = () => { modal.remove(); resolve(true); };
            });
        }

        function showToast(msg, type = 'error', silent = false) {
            if (!silent) playSound(type);
            const colors = { error: 'bg-red-500', success: 'bg-green-500', info: 'bg-blue-500' };
            const toast = document.createElement('div');
            toast.className = `fixed top-5 right-5 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-xl z-[100] fade-in flex items-center`;
            toast.innerHTML = `<span>${msg}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function showSpinner(btn) { btn.disabled = true; btn.dataset.originalHtml = btn.innerHTML; btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`; }
        function hideSpinner(btn) { btn.disabled = false; btn.innerHTML = btn.dataset.originalHtml; }

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => signOut(auth).then(() => showToast('৫ মিনিট নিষ্ক্রিয়তার কারণে লগআউট হয়েছে', 'info')), 300000);
        }
        ['mousemove', 'keydown', 'click', 'scroll'].forEach(evt => window.addEventListener(evt, resetIdleTimer));

        function cleanError(err) {
            const errors = { 'auth/invalid-email': 'ইমেইল ঠিকানাটি সঠিক নয়।', 'auth/user-not-found': 'এই ইমেইল বা ইউজারনেম দিয়ে কোনো অ্যাকাউন্ট নেই।', 'auth/wrong-password': 'পাসওয়ার্ড ভুল হয়েছে।', 'auth/email-already-in-use': 'Email already exist', 'auth/weak-password': 'পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে।', 'auth/network-request-failed': 'নেটওয়ার্ক সমস্যা! ইন্টারনেট সংযোগ পরীক্ষা করুন।', 'permission-denied': 'অনুমতি নেই।' };
            if (err && err.code && errors[err.code]) return errors[err.code];
            return 'কিছু একটা সমস্যা হয়েছে। আবার চেষ্টা করুন।';
        }

        function getMonthNumber(monthStr) {
            if (!monthStr) return 0;
            const m = monthStr.toLowerCase().trim();
            const map = { 'january': 0, 'february': 1, 'march': 2, 'april': 3, 'may': 4, 'june': 5, 'july': 6, 'august': 7, 'september': 8, 'october': 9, 'november': 10, 'december': 11, 'বৈশাখ': 3, 'জ্যৈষ্ঠ': 4, 'আষাঢ়': 5, 'শ্রাবণ': 6, 'ভাদ্র': 7, 'আশ্বিন': 8, 'কার্তিক': 9, 'অগ্রহায়ণ': 10, 'পৌষ': 11, 'মাঘ': 0, 'ফাল্গুন': 1, 'চৈত্র': 2, 'জানুয়ারি': 0, 'ফেব্রুয়ারি': 1, 'মার্চ': 2, 'এপ্রিল': 3, 'জুন': 5, 'জুলাই': 6, 'আগস্ট': 7, 'সেপ্টেম্বর': 8, 'অক্টোবর': 9, 'নভেম্বর': 10, 'ডিসেম্বর': 11 };
            for (let key in map) if (m.includes(key)) return map[key];
            return 0;
        }

        onAuthStateChanged(auth, (user) => { if (user) renderDashboard(); else renderAuth(); });

            appContainer.innerHTML = `

                            </div>

                        </div>
                        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">

                                <button id="tabSignup" class="flex-1 py-4 font-bold text-slate-500 hover:text-slate-800 transition">সাইন আপ</button>
                            </div>
                            <div class="p-8 space-y-6">

                                    <div><label class="block text-xs font-medium text-slate-600 mb-1">ইমেইল অথবা ইউজারনেম</label><input type="text" id="loginIdentifier" name="loginIdentifier" list="identifierList" autocomplete="username" class="premium-input w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 outline-none transition" required><datalist id="identifierList">${optionsHtml}</datalist></div>

        // স্বয়ংক্রিয়ভাবে নতুন বছরে বকেয়া ট্রান্সফার (মাস অনুযায়ী)
        async function autoRollover() {
            let currentYear = new Date().getFullYear();
            let currentMonth = new Date().getMonth();
            let updates = [];
            
            for (let lease of allLeases) {
                if (lease.status === 'active') {
                    let yearVal = parseInt(normalizeYear(lease.year));
                    if (isNaN(yearVal)) continue; 
                    
                    let currentYearData = lease.yearlyData?.[lease.year] || {};
                    if (currentYearData.isPaused) continue;
                    
                    let cycleMonth = getMonthNumber(lease.cycleType);
                    let activeCycleYear = currentYear;
                    if (currentMonth < cycleMonth) activeCycleYear = currentYear - 1;
                    
                    if (yearVal < activeCycleYear) {
                        let year = normalizeYear(lease.year);
                        let yearlyData = lease.yearlyData || {};
                        let history = lease.history || [];
                        let updated = false;

                        while (parseInt(year) < activeCycleYear) {
                            let nextYear = (parseInt(year) + 1).toString();
                            
                            if (yearlyData[nextYear]) {
                                year = nextYear;
                                continue; // সাল আগে থেকেই তৈরি আছে
                            }
                            
                            let currentDue = parseFloat(lease.dueAmount);
                            if (currentDue < 0) currentDue = 0;
                            
                            let nextCarriedDue = currentDue; // বকেয়া থাকলে যুক্ত হবে, নাহলে 0
                            let oldCarriedDueYears = yearlyData[year]?.carriedDueYears || '';
                            let newCarriedDueYears = nextCarriedDue > 0 ? (oldCarriedDueYears ? `${oldCarriedDueYears}, ${year}` : year) : '';
                            
                            let amount = yearlyData[year]?.amount !== undefined ? parseFloat(yearlyData[year].amount) : parseFloat(lease.amount);
                            let rate = yearlyData[year]?.ratePer33 !== undefined ? parseFloat(yearlyData[year].ratePer33) : parseFloat(lease.ratePer33);
                            let nextCost = (amount / 33) * rate;
                            let nextTotal = nextCarriedDue + nextCost;
                            
                            if (yearlyData[year]) yearlyData[year].status = 'transferred';
                            else yearlyData[year] = { ratePer33: rate, amount: amount, totalCost: parseFloat(lease.totalCost).toFixed(2), paidAmount: parseFloat(lease.paidAmount).toFixed(2), dueAmount: currentDue.toFixed(2), status: 'transferred' };
                            
                            yearlyData[nextYear] = { 
                                ratePer33: rate, 
                                amount: amount, 
                                totalCost: nextTotal.toFixed(2), 
                                paidAmount: 0, 
                                dueAmount: nextTotal.toFixed(2), 
                                status: 'active', 
                                isPaused: false, 
                                carriedDue: nextCarriedDue.toFixed(2), 
                                carriedDueYears: newCarriedDueYears 
                            };
                            
                            history.push({ date: new Date().toLocaleDateString('bn-BD'), type: 'new_year', fromYear: year, toYear: nextYear, carriedDue: nextCarriedDue.toFixed(2) });
                            
                            // লুপের পরবর্তী ইটারেশনের জন্য lease অবজেক্ট আপডেট
                            lease.year = nextYear;
                            lease.totalCost = nextTotal.toFixed(2);
                            lease.paidAmount = 0;
                            lease.dueAmount = nextTotal.toFixed(2);
                            lease.ratePer33 = rate;
                            lease.amount = amount;
                            
                            year = nextYear;
                            updated = true;
                        }
                        
                        if (updated) {
                            updates.push(updateDoc(doc(db, "leases", lease.id), {
                                year: year,
                                ratePer33: lease.ratePer33,
                                amount: lease.amount,
                                totalCost: lease.totalCost,
                                paidAmount: 0,
                                dueAmount: lease.dueAmount,
                                history: history,
                                yearlyData: yearlyData
                            }));
                        }
                    }
                }
            }
            
            if (updates.length > 0) {
                await Promise.all(updates);
                showToast(`${updates.length} টি হিসাব স্বয়ংক্রিয়ভাবে নতুন হিসাব বর্ষে আপডেট হয়েছে।`, 'info');
            }
        }

        function loadLeases() {
            const q = collection(db, "leases");
            onSnapshot(q, (snapshot) => {
                allLeases = []; snapshot.forEach(d => allLeases.push({ id: d.id, ...d.data() }));
                
                autoRollover(); // মাস অনুযায়ী নতুন সালে ট্রান্সফার হবে
                
                for (let lease of allLeases) {
                    if (lease.status === 'active') {
                        const yearlyData = lease.yearlyData || {}; let maxYear = 0;
                        for (let y in yearlyData) {
                            if (yearlyData[y].status === 'active' || yearlyData[y].isPaused === true) {
                                let yNum = parseInt(y); if (yNum > maxYear) maxYear = yNum;
                            }
                        }
                        if (maxYear > 0) {
                            let maxYearStr = maxYear.toString();
                            if (lease.year !== maxYearStr) {
                                lease.year = maxYearStr; const yData = yearlyData[maxYearStr];
                                lease.amount = yData.amount !== undefined ? yData.amount : lease.amount;
                                lease.ratePer33 = yData.ratePer33; lease.totalCost = yData.totalCost; lease.paidAmount = yData.paidAmount; lease.dueAmount = yData.dueAmount;
                            }
                        }
                    }
                }
                allLeases.sort((a, b) => { const aYear = parseInt(normalizeYear(a.year)) || 0; const bYear = parseInt(normalizeYear(b.year)) || 0; if (a.status !== b.status) return a.status === 'active' ? -1 : 1; return bYear - aYear; });
                renderTable();
            });
        }

                if(!newName) { hideSpinner(btn); return showToast('নতুন চাষীর নাম দিন'); }
                
                const oldRef = doc(db, "leases", id); const oldSnap = await getDoc(oldRef); const oldData = oldSnap.data();
                const q2 = query(collection(db, "leases"), where("farmerName", "==", newName), where("status", "==", "active")); const newFarmerSnap = await getDocs(q2);
                
                const oldYearlyData = oldData.yearlyData || {}; const oldYear = oldData.year; const oldYData = oldYearlyData[oldYear] || {};
                const isPaused = oldYData.isPaused === true;
                const oldAmount = oldYData.amount !== undefined ? parseFloat(oldYData.amount) : parseFloat(oldData.amount);
                const oldRate = oldYData.ratePer33 !== undefined ? parseFloat(oldYData.ratePer33) : parseFloat(oldData.ratePer33);
                const oldCarriedDue = oldYData.carriedDue !== undefined ? parseFloat(oldYData.carriedDue) : (parseFloat(oldData.totalCost) - (oldAmount / 33 * oldRate));
                const oldCarriedDueYears = oldYData.carriedDueYears || '';
                
                const oldNewAmount = oldAmount - tAmount;
                const oldNewCurrentCost = (oldNewAmount / 33) * oldRate;
                
                let oldNewTotal;
                if (isPaused) {
                    oldNewTotal = oldCarriedDue;
                } else {
                    oldNewTotal = oldCarriedDue + oldNewCurrentCost;
                }
                let oldNewDue = oldNewTotal - parseFloat(oldData.paidAmount);
                if (oldNewDue < 0) oldNewDue = 0;

                const oldHistory = oldData.history || []; oldHistory.push({ date: new Date().toLocaleDateString('bn-BD'), amount: tAmount, type: 'transfer_out', to: newName });
                if (oldYearlyData[oldYear]) { oldYearlyData[oldYear].amount = oldNewAmount; oldYearlyData[oldYear].carriedDueYears = oldCarriedDueYears; oldYearlyData[oldYear].carriedDue = oldCarriedDue.toFixed(2); oldYearlyData[oldYear].totalCost = oldNewTotal.toFixed(2); oldYearlyData[oldYear].dueAmount = oldNewDue.toFixed(2); }
                await updateDoc(oldRef, { amount: oldNewAmount, totalCost: oldNewTotal.toFixed(2), dueAmount: oldNewDue.toFixed(2), history: oldHistory, yearlyData: oldYearlyData });

                if (!newFarmerSnap.empty) {
                    const newDoc = newFarmerSnap.docs[0]; const newData = newDoc.data(); 
                    const newYearlyData = newData.yearlyData || {}; const newYear = newData.year; const newYData = newYearlyData[newYear] || {};
                    const newAmount = (newYData.amount !== undefined ? parseFloat(newYData.amount) : parseFloat(newData.amount)) + tAmount; 
                    const newRate = newYData.ratePer33 !== undefined ? parseFloat(newYData.ratePer33) : parseFloat(newData.ratePer33);
                    const newCurrentCost = (newAmount / 33) * newRate;
                    const newCarriedDue = newYData.carriedDue !== undefined ? parseFloat(newYData.carriedDue) : (parseFloat(newData.totalCost) - (parseFloat(newData.amount) / 33 * newRate));
                    const newCarriedDueYears = newYData.carriedDueYears || '';
                    const newTotal = newCarriedDue + newCurrentCost;
                    const newHistory = newData.history || []; newHistory.push({ date: new Date().toLocaleDateString('bn-BD'), amount: tAmount, type: 'transfer_in', from: oldData.farmerName });
                    if (newYearlyData[newYear]) { newYearlyData[newYear].amount = newAmount; newYearlyData[newYear].carriedDueYears = newCarriedDueYears; newYearlyData[newYear].carriedDue = newCarriedDue.toFixed(2); newYearlyData[newYear].totalCost = parseFloat(newTotal).toFixed(2); newYearlyData[newYear].dueAmount = (parseFloat(newTotal) - parseFloat(newData.paidAmount)).toFixed(2); }
                    await updateDoc(doc(db, "leases", newDoc.id), { amount: newAmount, totalCost: parseFloat(newTotal).toFixed(2), dueAmount: (parseFloat(newTotal) - parseFloat(newData.paidAmount)).toFixed(2), history: newHistory, yearlyData: newYearlyData });
                } else {
                    const newTotal = fmt((tAmount / 33) * parseFloat(oldData.ratePer33));
                    const newYearlyData = {}; newYearlyData[oldData.year] = { ratePer33: oldData.ratePer33, amount: tAmount, totalCost: parseFloat(newTotal), paidAmount: 0, dueAmount: parseFloat(newTotal), status: 'active', isPaused: false, carriedDue: 0, carriedDueYears: '' };
                    await addDoc(collection(db, "leases"), { farmerName: newName, amount: tAmount, ratePer33: oldData.ratePer33, cycleType: oldData.cycleType, year: oldData.year, totalCost: parseFloat(newTotal), paidAmount: 0, dueAmount: parseFloat(newTotal), status: 'active', history: [{ date: new Date().toLocaleDateString('bn-BD'), amount: tAmount, type: 'transfer_in', from: oldData.farmerName }], yearlyData: newYearlyData });
                }
                showToast('জমি সফলভাবে হস্তান্তর হয়েছে!', 'success'); document.getElementById('modalContainer').classList.add('hidden');
            };
        }

        function openEditRateModal(id, currentYear, oldRate) {
            openModal(`
                <h3 class="text-lg font-bold mb-4 text-slate-800">দর এবং বছর পরিবর্তন</h3>
                <label class="text-sm text-slate-500">বর্তমান বছর: ${currentYear}</label>
                <input type="text" id="editYear" value="${currentYear}" placeholder="নতুন বছর" class="w-full p-3 border rounded-lg mb-3 mt-1">
                <label class="text-sm text-slate-500">বর্তমান দর: ${oldRate}</label>
                <input type="number" id="newRate" value="${oldRate}" placeholder="নতুন দর" class="w-full p-3 border rounded-lg mb-4 mt-1">
                <button id="confirmEdit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 flex justify-center">আপডেট করুন</button>
                <button class="w-full bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300 mt-2" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল করুন</button>`);
            document.getElementById('confirmEdit').onclick = async () => {
                const btn = document.getElementById('confirmEdit'); showSpinner(btn);
                const newRate = parseFloat(document.getElementById('newRate').value); const newYear = normalizeYear(document.getElementById('editYear').value);
                if(isNaN(newRate) || newRate <= 0 || !newYear) { hideSpinner(btn); return showToast('সঠিক তথ্য দিন'); }
                const ref = doc(db, "leases", id); const snap = await getDoc(ref); const data = snap.data();
                const yData = data.yearlyData?.[data.year] || {};
                const currentAmount = yData.amount !== undefined ? parseFloat(yData.amount) : parseFloat(data.amount);
                const newCost = (currentAmount / 33) * newRate; const carriedDue = yData.carriedDue || 0; const carriedDueYears = yData.carriedDueYears || '';
                const newTotal = parseFloat(carriedDue) + newCost; const newDue = newTotal - parseFloat(data.paidAmount);
                const history = data.history || []; history.push({ date: new Date().toLocaleDateString('bn-BD'), type: 'edit', oldYear: data.year, newYear: newYear, oldRate: data.ratePer33, newRate: newRate });
                const yearlyData = data.yearlyData || {};
                if (yearlyData[newYear]) { yearlyData[newYear].amount = currentAmount; yearlyData[newYear].ratePer33 = newRate; yearlyData[newYear].carriedDueYears = carriedDueYears; yearlyData[newYear].totalCost = parseFloat(newTotal).toFixed(2); yearlyData[newYear].dueAmount = fmt(newDue); } 
                else { yearlyData[newYear] = { amount: currentAmount, ratePer33: newRate, totalCost: parseFloat(newTotal).toFixed(2), paidAmount: data.paidAmount, dueAmount: fmt(newDue), status: 'active', isPaused: false, carriedDue: parseFloat(carriedDue).toFixed(2), carriedDueYears: carriedDueYears }; }
                await updateDoc(ref, { ratePer33: newRate, year: newYear, totalCost: parseFloat(newTotal).toFixed(2), dueAmount: fmt(newDue), history, yearlyData });
                expandedRows.add(id); showToast('দর এবং বছর আপডেট হয়েছে!', 'success'); document.getElementById('modalContainer').classList.add('hidden');
            };
        }

        function openAdjustDueModal(id, name, oldYear, due) {
            let oldYearNum = parseInt(normalizeYear(oldYear)); if (isNaN(oldYearNum)) oldYearNum = new Date().getFullYear(); const nextYear = (oldYearNum + 1).toString();
            openModal(`
                <h3 class="text-lg font-bold mb-2 text-slate-800">${name} - বকেয়া ট্রান্সফার</h3>
                <div class="bg-slate-50 p-3 rounded-lg mb-4 text-sm"><p>বর্তমান বছর: <b>${oldYear}</b></p><p>বর্তমান বকেয়া: <b class="text-red-600">${fmt(due)} টাকা</b></p></div>
                <label class="text-sm text-slate-500">নতুন হিসাব বর্ষ</label><input type="text" id="adjustYear" value="${nextYear}" class="w-full p-3 border rounded-lg mb-3 mt-1">
                <label class="text-sm text-slate-500">নতুন বছরের দর (৩৩ শতাংশ)</label><input type="number" id="adjustRate" placeholder="যেমন: ২০০০০" class="w-full p-3 border rounded-lg mb-4 mt-1">
                <button id="confirmAdjust" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold hover:bg-indigo-700 flex justify-center">নতুন বছরে নিন</button>
                <button class="w-full bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300 mt-2" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল করুন</button>`);
            document.getElementById('confirmAdjust').onclick = async () => {
                const btn = document.getElementById('confirmAdjust'); showSpinner(btn);
                const newYear = normalizeYear(document.getElementById('adjustYear').value); const newRate = parseFloat(document.getElementById('adjustRate').value);
                if(!newYear || isNaN(newRate)) { hideSpinner(btn); return showToast('সঠিক তথ্য দিন'); }
                const ref = doc(db, "leases", id); const snap = await getDoc(ref); const data = snap.data();
                
                // বকয়া পরিশোধ হলে 0 হবে, নাহলে বকয়া থাকবে
                let oldDue = parseFloat(data.dueAmount);
                if (oldDue < 0) oldDue = 0;
                
                const newYearCost = ((data.amount / 33) * newRate); 
                const totalNewCost = oldDue + newYearCost; // বকয়া 0 হলে শুধু নতুন হারি হবে
                
                const yData = data.yearlyData?.[data.year] || {};
                const oldCarriedDueYears = yData.carriedDueYears || '';
                // বকয়া থাকলে সাল যুক্ত হবে, নাহলে খালি থাকবে
                const newCarriedDueYears = oldDue > 0 ? (oldCarriedDueYears ? `${oldCarriedDueYears}, ${data.year}` : data.year) : '';

                const history = data.history || []; history.push({ date: new Date().toLocaleDateString('bn-BD'), type: 'new_year', fromYear: data.year, toYear: newYear, carriedDue: fmt(oldDue) });
                const yearlyData = data.yearlyData || {};
                if (yearlyData[data.year]) yearlyData[data.year].status = 'transferred';
                else yearlyData[data.year] = { ratePer33: data.ratePer33, amount: data.amount, totalCost: data.totalCost, paidAmount: data.paidAmount, dueAmount: oldDue, status: 'transferred' };
                
                yearlyData[newYear] = { 
                    ratePer33: newRate, 
                    amount: data.amount, 
                    totalCost: fmt(totalNewCost), 
                    paidAmount: 0, 
                    dueAmount: fmt(totalNewCost), 
                    status: 'active', 
                    isPaused: false, 
                    carriedDue: fmt(oldDue), 
                    carriedDueYears: newCarriedDueYears 
                };
                
                await updateDoc(ref, { year: newYear, ratePer33: newRate, totalCost: fmt(totalNewCost), paidAmount: 0, dueAmount: fmt(totalNewCost), status: 'active', history, yearlyData });
                expandedRows.add(id); showToast('নতুন হিসাব বর্ষ সফলভাবে শুরু হয়েছে!', 'success'); document.getElementById('modalContainer').classList.add('hidden');
            };
        }

        async function openHistoryModal(farmerName) {
            const modal = document.getElementById('modalContainer'); modal.classList.remove('hidden');
            modal.innerHTML = `<div class="bg-white rounded-2xl p-6 w-full max-w-md fade-in relative h-[80vh] flex flex-col"><div class="animate-pulse text-center py-10">লোড হচ্ছে...</div></div>`;
            modal.onclick = (e) => { if (e.target.id === 'modalContainer') modal.classList.add('hidden'); };
            const q = query(collection(db, "leases"), where("farmerName", "==", farmerName)); const snap = await getDocs(q);
            let allHistory = [];
            snap.forEach(doc => { const data = doc.data(); (data.history || []).forEach(h => allHistory.push({ ...h, context: `${data.year} (${data.amount} শতাংশ)` })); });
            let historyPage = 1; const historyPerPage = 8;
            function renderHistoryPage() {
                const totalPages = Math.ceil(allHistory.length / historyPerPage); const start = (historyPage - 1) * historyPerPage; const end = start + historyPerPage; const paginatedHistory = allHistory.slice(start, end);
                let historyHTML = '';
                paginatedHistory.forEach(h => {
                    historyHTML += `<div class="mb-3 border-l-4 border-indigo-200 pl-3"><p class="font-bold text-xs text-slate-400">${h.context}</p><ul class="mt-1 space-y-1 text-xs">`;
                    if(h.type === 'payment') {
                        let payLabel = 'জমা';
                        if (h.paused) {
                            payLabel = (h.years ? h.years + ' সালের বকেয়া বাবদ জমা' : 'পূর্বের বকেয়া বাবদ জমা');
                        } else {
                            payLabel = (h.year ? h.year + ' সালের জমা' : 'জমা');
                        }
                        historyHTML += `<li class="text-green-600 flex justify-between"><span>${h.date}</span> <span>+${fmt(h.amount)} টাকা ${payLabel}</span></li>`;
                    }
                    else if(h.type === 'transfer_out') historyHTML += `<li class="text-yellow-600 flex justify-between"><span>${h.date}</span> <span>${h.amount} শতাংশ হস্তান্তর (${h.to})</span></li>`;
                    else if(h.type === 'transfer_in') historyHTML += `<li class="text-blue-600 flex justify-between"><span>${h.date}</span> <span>${h.amount} শতাংশ পেয়েছেন (${h.from})</span></li>`;
                    else if(h.type === 'edit') historyHTML += `<li class="text-gray-500 flex justify-between"><span>${h.date}</span> <span>দর/বছর পরিবর্তন: ${h.oldRate}->${h.newRate}</span></li>`;
                    else if(h.type === 'manage') { let action = h.paused ? 'হিসাব স্থগিত করা হয়েছে' : 'হিসাব চালু করা হয়েছে'; historyHTML += `<li class="text-orange-500 flex justify-between"><span>${h.date}</span> <span>${action} (মোট: ${h.total}, জমা: ${h.paid})</span></li>`; }
                    else if(h.type === 'new_year') historyHTML += `<li class="text-indigo-600 flex justify-between"><span>${h.date}</span> <span>${h.fromYear} থেকে ${h.toYear} সালে ${h.carriedDue} টাকা যোগ হয়েছে</span></li>`;
                    historyHTML += `</ul></div>`;
                });
                let paginationHTML = '';
                if (totalPages > 1) { paginationHTML = `<div class="flex justify-center items-center gap-2 mt-4 pt-3 border-t"><button id="prevHist" class="px-3 py-1 bg-slate-200 rounded text-sm ${historyPage === 1 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-slate-300'}">পূর্ববর্তী</button><span class="text-sm">${historyPage} / ${totalPages}</span><button id="nextHist" class="px-3 py-1 bg-slate-200 rounded text-sm ${historyPage === totalPages ? 'opacity-50 cursor-not-allowed' : 'hover:bg-slate-300'}">পরবর্তী</button></div>`; }
                modal.innerHTML = `<div class="bg-white rounded-2xl p-6 w-full max-w-md fade-in relative h-[80vh] flex flex-col"><button class="absolute top-4 right-4 text-slate-400 hover:text-red-500 text-2xl" onclick="document.getElementById('modalContainer').classList.add('hidden')">&times;</button><h3 class="text-lg font-bold mb-4 text-slate-800">${farmerName} এর ইতিহাস</h3><div class="flex-1 overflow-y-auto pr-2">${historyHTML || '<p class="text-slate-500 text-center py-4">কোনো ইতিহাস নেই।</p>'}</div>${paginationHTML}</div>`;
                const prevBtn = document.getElementById('prevHist'); const nextBtn = document.getElementById('nextHist');
                if(prevBtn) prevBtn.onclick = () => { if(historyPage > 1) { historyPage--; renderHistoryPage(); } };
                if(nextBtn) nextBtn.onclick = () => { if(historyPage < totalPages) { historyPage++; renderHistoryPage(); } };
            }
            renderHistoryPage();
        }
    </script>
</head>

        <div class="flex items-center justify-center min-h-screen">

        </div>
    </div>
