<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জমি লিজ ম্যানেজমেন্ট সিস্টেম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 5px; }
        .premium-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
        
        /* Desktop & Mobile Helpers */
        .desktop-only { display: flex; }
        .collapsed-view { display: none; }

        /* Mobile Responsive Table (Slim 3D Collapsible Cards) */
        @media (max-width: 767px) {
            .desktop-only { display: none !important; }
            .collapsed-view { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 2px 0; }
            
            .table-fixed thead { display: none; }
            .table-fixed, .table-fixed tbody, .table-fixed tr, .table-fixed td { display: block; width: 100%; }
            .table-fixed tbody tr { 
                margin-bottom: 0.5rem; 
                border: 1px solid #94a3b8; 
                border-radius: 0.5rem; 
                background: white; 
                padding: 0.35rem 0.75rem; 
                box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
                cursor: pointer;
                transition: all 0.2s;
            }
            .table-fixed tbody tr.bg-red-50 { 
                background-color: #fef2f2 !important; 
                border-color: #ef4444 !important; 
            }
            .table-fixed td { padding: 0; margin: 0; border: none; text-align: right; font-size: 12px; }
            .table-fixed td::before { display: none; }
            
            /* Collapsed State */
            .table-fixed td.collapsible { display: none; }
            .table-fixed td[data-label="চাষীর নাম ও সাল"] { padding: 0; cursor: pointer; }
            .collapsed-name { color: #dc2626; font-weight: 800; font-size: 15px; line-height: 1.1; }
            .collapsed-year { color: #0891b2; font-weight: 700; font-size: 11px; display: block; margin-top: -2px; }
            .collapsed-amount { color: #475569; font-size: 11px; font-weight: 600; text-align: center; }
            .collapsed-due { color: #dc2626; font-weight: 700; font-size: 13px; white-space: nowrap; text-align: right; }
            .collapsed-paid { color: #16a34a; font-weight: 700; font-size: 13px; }
            .collapsed-transferred { color: #4f46e5; font-weight: 700; font-size: 13px; }

            /* Expanded State */
            .table-fixed tbody tr.expanded { box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
            .table-fixed tbody tr.expanded td.collapsible { display: block; padding-top: 8px; border-top: 1px solid #e2e8f0; margin-top: 8px; }
            .table-fixed tbody tr.expanded td[data-label="অ্যাকশন"] { 
                justify-content: flex-end; gap: 0.5rem; padding-top: 8px; border-top: 1px solid #e2e8f0; margin-top: 8px; display: flex;
            }
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, setDoc, doc, onSnapshot, updateDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZhV6G0D-fTrH2auEqgtz72DGrBHpgFDU",
            authDomain: "lease-management-c7c35.firebaseapp.com",
            projectId: "lease-management-c7c35",
            storageBucket: "lease-management-c7c35.firebasestorage.app",
            messagingSenderId: "182624418687",
            appId: "1:182624418687:web:6e5964459b5c2287f5384a"};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const appContainer = document.getElementById('app');
        let idleTimer = null;
        let allLeases = []; 
        let currentPage = 1;
        const itemsPerPage = 5;

        const fmt = (val) => (parseFloat(val) || 0).toFixed(2);

        function showToast(msg, type = 'error') {
            const colors = { error: 'bg-red-500', success: 'bg-green-500', info: 'bg-blue-500' };
            const toast = document.createElement('div');
            toast.className = `fixed top-5 right-5 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-xl z-[100] fade-in flex items-center`;
            toast.innerHTML = `<span>${msg}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function showSpinner(btn) {
            btn.disabled = true;
            btn.dataset.originalHtml = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
        }
        function hideSpinner(btn) { btn.disabled = false; btn.innerHTML = btn.dataset.originalHtml; }

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                signOut(auth).then(() => showToast('৫ মিনিট নিষ্ক্রিয়তার কারণে লগআউট হয়েছে', 'info'));
            }, 300000);
        }
        ['mousemove', 'keydown', 'click', 'scroll'].forEach(evt => window.addEventListener(evt, resetIdleTimer));

        function cleanError(errCode) {
            const errors = {
                'auth/invalid-email': 'ইমেইল ঠিকানাটি সঠিক নয়।',
                'auth/user-not-found': 'এই ইমেইল বা ইউজারনেম দিয়ে কোনো অ্যাকাউন্ট নেই।',
                'auth/wrong-password': 'পাসওয়ার্ড ভুল হয়েছে।',
                'auth/email-already-in-use': 'Email already exist',
                'auth/weak-password': 'পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে।'
            };
            return errors[errCode] || 'কিছু একটা সমস্যা হয়েছে। আবার চেষ্টা করুন।';
        }

        onAuthStateChanged(auth, (user) => {
            if (user) { renderDashboard(); } 
            else { renderAuth(); }
        });

        // ---------- ১. প্রফেশনাল অ্যাশ কালার লগইন পেজ ----------
        function renderAuth() {
            const savedIds = JSON.parse(localStorage.getItem('savedIdentifiers') || '[]');
            const optionsHtml = savedIds.map(id => `<option value="${id}">`).join('');

            appContainer.innerHTML = `
                <div class="min-h-screen flex items-center justify-center bg-slate-200 p-4">
                    <div class="w-full max-w-md">
                        <div class="text-center mb-8">
                            <div class="inline-block p-4 bg-white rounded-2xl shadow-lg mb-4 border border-slate-200">
                                <svg class="w-10 h-10 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21l1.65-3.8a9 9 0 113.4 2.9L3 21"></path></svg>
                            </div>
                            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">জমি লিজ ম্যানেজমেন্ট</h1>
                            <p class="text-slate-500 mt-2 text-sm">নিরাপদ ও স্মার্ট হিসাব ব্যবস্থাপনা</p>
                        </div>
                        
                        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                            <div class="flex border-b border-slate-200">
                                <button id="tabLogin" class="flex-1 py-4 font-bold text-white bg-slate-800 transition relative">লগইন <span class="absolute bottom-0 left-1/4 right-1/4 h-1 bg-cyan-500"></span></button>
                                <button id="tabSignup" class="flex-1 py-4 font-bold text-slate-500 hover:text-slate-800 transition">সাইন আপ</button>
                            </div>

                            <div class="p-8 space-y-6">
                                <form id="loginForm" class="space-y-5">
                                    <div>
                                        <label class="block text-xs font-medium text-slate-600 mb-1">ইমেইল অথবা ইউজারনেম</label>
                                        <input type="text" id="loginIdentifier" name="loginIdentifier" list="identifierList" autocomplete="username" class="premium-input w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 outline-none transition" required>
                                        <datalist id="identifierList">${optionsHtml}</datalist>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-slate-600 mb-1">পাসওয়ার্ড</label>
                                        <input type="password" id="loginPassword" name="loginPassword" autocomplete="current-password" class="premium-input w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 outline-none transition" required>
                                    </div>
                                    <button type="submit" id="loginBtn" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold hover:bg-slate-900 transition flex justify-center shadow-md">লগইন করুন</button>
                                    <button type="button" id="forgotBtn" class="w-full text-center text-sm text-cyan-600 hover:text-cyan-700 hover:underline">পাসওয়ার্ড ভুলে গেছেন?</button>
                                </form>

                                <form id="signupForm" class="space-y-5 hidden">
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-medium text-slate-600 mb-1">ইউজারনেম</label>
                                            <input type="text" id="suUsername" name="suUsername" autocomplete="off" class="premium-input w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 outline-none" required>
                                            <p id="userCheckMsg" class="text-xs mt-1 h-4 font-bold"></p>
                                        </div>
                                        <div>
                                            <label class="block text-xs font-medium text-slate-600 mb-1">মোবাইল</label>
                                            <input type="text" id="suMobile" name="suMobile" autocomplete="off" class="premium-input w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 outline-none" required>
                                            <p class="text-xs mt-1 h-4"></p>
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-slate-600 mb-1">ইমেইল</label>
                                        <input type="email" id="suEmail" name="suEmail" autocomplete="email" class="premium-input w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 outline-none" required>
                                        <p id="emailCheckMsg" class="text-xs mt-1 h-4 font-bold"></p>
                                    </div>
                                    <div><label class="block text-xs font-medium text-slate-600 mb-1">পাসওয়ার্ড</label><input type="password" id="suPassword" name="suPassword" autocomplete="new-password" class="premium-input w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 outline-none" required></div>
                                    <button type="submit" id="signupBtn" class="w-full bg-emerald-600 text-white p-3 rounded-xl font-bold hover:bg-emerald-700 transition flex justify-center shadow-md">রেজিস্টার করুন</button>
                                </form>

                                <form id="forgotForm" class="space-y-5 hidden">
                                    <p class="text-sm text-slate-500">পাসওয়ার্ড রিকভারির জন্য আপনার রেজিস্টার্ড ইমেইল দিন।</p>
                                    <input type="email" id="resetEmail" name="resetEmail" autocomplete="email" class="premium-input w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 outline-none" placeholder="রেজিস্টার্ড ইমেইল" required>
                                    <button type="submit" id="resetBtn" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold flex justify-center">রিসেট লিংক পাঠান</button>
                                    <button type="button" id="backToLogin" class="w-full text-center text-sm text-slate-500 hover:text-slate-800 hover:underline">লগইন পেজে ফিরে যান</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const forgotForm = document.getElementById('forgotForm');

            document.getElementById('tabLogin').onclick = () => {
                loginForm.classList.remove('hidden'); signupForm.classList.add('hidden'); forgotForm.classList.add('hidden');
                document.getElementById('tabLogin').className = "flex-1 py-4 font-bold text-white bg-slate-800 transition relative";
                document.getElementById('tabLogin').innerHTML = `লগইন <span class="absolute bottom-0 left-1/4 right-1/4 h-1 bg-cyan-500"></span>`;
                document.getElementById('tabSignup').className = "flex-1 py-4 font-bold text-slate-500 hover:text-slate-800 transition";
                document.getElementById('tabSignup').innerText = "সাইন আপ";
            };
            document.getElementById('tabSignup').onclick = () => {
                signupForm.classList.remove('hidden'); loginForm.classList.add('hidden'); forgotForm.classList.add('hidden');
                document.getElementById('tabSignup').className = "flex-1 py-4 font-bold text-white bg-slate-800 transition relative";
                document.getElementById('tabSignup').innerHTML = `সাইন আপ <span class="absolute bottom-0 left-1/4 right-1/4 h-1 bg-cyan-500"></span>`;
                document.getElementById('tabLogin').className = "flex-1 py-4 font-bold text-slate-500 hover:text-slate-800 transition";
                document.getElementById('tabLogin').innerText = "লগইন";
            };
            document.getElementById('forgotBtn').onclick = () => { loginForm.classList.add('hidden'); forgotForm.classList.remove('hidden'); };
            document.getElementById('backToLogin').onclick = () => { forgotForm.classList.add('hidden'); loginForm.classList.remove('hidden'); };

            let debounceTimer;
            const checkExistence = async (field, value, msgId) => {
                clearTimeout(debounceTimer);
                const msgEl = document.getElementById(msgId);
                if (value.trim() === '') { msgEl.innerText = ''; return; }
                debounceTimer = setTimeout(async () => {
                    const q = query(collection(db, "users"), where(field, "==", value));
                    const snap = await getDocs(q);
                    if (!snap.empty) {
                        msgEl.innerText = 'already exist';
                        msgEl.className = 'text-xs mt-1 h-4 text-red-500 font-bold';
                    } else {
                        msgEl.innerText = 'available';
                        msgEl.className = 'text-xs mt-1 h-4 text-green-500 font-bold';
                    }
                }, 500);
            };

            document.getElementById('suUsername').addEventListener('input', (e) => checkExistence('username', e.target.value, 'userCheckMsg'));
            document.getElementById('suEmail').addEventListener('input', (e) => checkExistence('email', e.target.value, 'emailCheckMsg'));

            loginForm.onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('loginBtn');
                showSpinner(btn);
                const identifier = document.getElementById('loginIdentifier').value;
                const password = document.getElementById('loginPassword').value;
                let email = identifier;
                try {
                    if(!identifier.includes('@')) {
                        const q = query(collection(db, "users"), where("username", "==", identifier));
                        const snap = await getDocs(q);
                        if(snap.empty) { hideSpinner(btn); return showToast("এই ইউজারনেম দিয়ে কোনো অ্যাকাউন্ট নেই।"); }
                        email = snap.docs[0].data().email;
                    }
                    await signInWithEmailAndPassword(auth, email, password);
                    let savedIds = JSON.parse(localStorage.getItem('savedIdentifiers') || '[]');
                    if (!savedIds.includes(identifier)) {
                        savedIds.push(identifier);
                        localStorage.setItem('savedIdentifiers', JSON.stringify(savedIds));
                    }
                    showToast('সফলভাবে লগইন হয়েছে!', 'success');
                } catch (err) { showToast(cleanError(err.code)); }
                hideSpinner(btn);
            };

            signupForm.onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('signupBtn');
                showSpinner(btn);
                const username = document.getElementById('suUsername').value;
                const email = document.getElementById('suEmail').value;
                const mobile = document.getElementById('suMobile').value;
                const password = document.getElementById('suPassword').value;
                
                const q1 = query(collection(db, "users"), where("username", "==", username));
                const q2 = query(collection(db, "users"), where("email", "==", email));
                if (!(await getDocs(q1)).empty) { hideSpinner(btn); return showToast("Username already exist"); }
                if (!(await getDocs(q2)).empty) { hideSpinner(btn); return showToast("Email already exist"); }
                
                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, "users", userCredential.user.uid), { username, email, mobile });
                    showToast('সাইন আপ সফল হয়েছে!', 'success');
                } catch (err) { showToast(cleanError(err.code)); }
                hideSpinner(btn);
            };

            forgotForm.onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('resetBtn');
                showSpinner(btn);
                const email = document.getElementById('resetEmail').value;
                try {
                    await sendPasswordResetEmail(auth, email);
                    showToast('পাসওয়ার্ড রিসেট ইমেইল পাঠানো হয়েছে!', 'success');
                    document.getElementById('backToLogin').click();
                } catch (err) { showToast(cleanError(err.code)); }
                hideSpinner(btn);
            };
        }

        // ---------- ২. ড্যাশবোর্ড ----------
        function renderDashboard() {
            appContainer.innerHTML = `
                <div class="min-h-screen bg-slate-100">
                    <nav class="bg-slate-800 text-white p-4 flex justify-between items-center sticky top-0 z-10 shadow-md">
                        <div class="flex items-center gap-2">
                            <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21l1.65-3.8a9 9 0 113.4 2.9L3 21"></path></svg>
                            <h1 class="text-base md:text-xl font-bold">জমির লিজ ব্যবস্থাপনা</h1>
                        </div>
                        <button id="logoutBtn" class="bg-red-500 text-white px-3 md:px-4 py-2 rounded-lg text-sm hover:bg-red-600 transition flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                            <span class="hidden md:inline">লগআউট</span>
                        </button>
                    </nav>

                    <div class="container mx-auto p-3 md:p-6">
                        <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm mb-6 border border-slate-200">
                            <h2 class="text-md font-bold mb-3 text-slate-700 border-b pb-2">নতুন চাষের হিসাব যুক্ত করুন</h2>
                            <form id="leaseForm" class="grid grid-cols-2 md:grid-cols-6 gap-3">
                                <input type="text" id="farmerName" placeholder="চাষীর নাম" class="p-2 border rounded-lg text-sm col-span-2 md:col-span-1" required>
                                <input type="number" step="0.01" id="amount" placeholder="জমির পরিমাণ (শতাংশ)" class="p-2 border rounded-lg text-sm" required>
                                <input type="number" id="ratePer33" placeholder="দর (যেমন: ১৮০০০)" class="p-2 border rounded-lg text-sm" required>
                                <select id="cycleType" class="p-2 border rounded-lg text-sm">
                                    <option value="জ্যৈষ্ঠ">জ্যৈষ্ঠ টু জ্যৈষ্ঠ</option>
                                    <option value="জানুয়ারি">জানুয়ারি টু জানুয়ারি</option>
                                </select>
                                <input type="text" id="year" placeholder="বছর (২০২৪)" class="p-2 border rounded-lg text-sm" required>
                                <button type="submit" class="bg-indigo-600 text-white p-2 rounded-lg text-sm hover:bg-indigo-700 font-bold">যুক্ত করুন</button>
                            </form>
                        </div>

                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div class="p-4 border-b flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                                <h2 class="text-md font-bold text-slate-700">চলমান হিসাব সমূহ</h2>
                                <input type="text" id="searchInput" placeholder="নাম দিয়ে সার্চ করুন..." class="p-2 border rounded-lg text-sm w-full md:w-64 outline-none focus:border-indigo-500">
                            </div>
                            
                            <div class="p-2 md:p-4">
                                <table class="w-full text-left text-slate-600 table-fixed">
                                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase">
                                        <tr>
                                            <th class="p-3 w-1/5">চাষীর নাম ও সাল</th>
                                            <th class="p-3 w-1/5">জমি / দর</th>
                                            <th class="p-3 w-1/5">মোট / পরিশোধিত</th>
                                            <th class="p-3 w-1/5">বকেয়া</th>
                                            <th class="p-3 w-1/5 text-right">অ্যাকশন</th>
                                        </tr>
                                    </thead>
                                    <tbody id="leasesTable" class="divide-y divide-slate-100"></tbody>
                                </table>
                            </div>
                            <div id="pagination" class="p-4 flex justify-center items-center gap-2 border-t"></div>
                        </div>
                    </div>
                </div>
                <div id="modalContainer" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4"></div>
            `;

            document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
            document.getElementById('leaseForm').addEventListener('submit', addLease);
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentPage = 1;
                renderTable();
            });
            
            document.getElementById('leasesTable').addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (btn) {
                    e.stopPropagation(); 
                    const id = btn.dataset.id;
                    if (btn.classList.contains('payBtn')) openPaymentModal(id, btn.dataset.name);
                    else if (btn.classList.contains('transferBtn')) openTransferModal(id, btn.dataset.amount);
                    else if (btn.classList.contains('editBtn')) openEditRateModal(id, btn.dataset.year, btn.dataset.rate);
                    else if (btn.classList.contains('delBtn')) handleDelete(id);
                    else if (btn.classList.contains('adjustBtn')) openAdjustDueModal(id, btn.dataset.name, btn.dataset.year, btn.dataset.due);
                } else if (e.target.closest('.collapsed-name')) {
                    e.stopPropagation();
                    openHistoryModal(e.target.closest('.collapsed-name').dataset.name);
                } else if (e.target.closest('.farmer-name')) {
                    e.stopPropagation();
                    openHistoryModal(e.target.closest('.farmer-name').dataset.name);
                } else if (e.target.closest('input')) {
                    e.stopPropagation();
                } else {
                    const tr = e.target.closest('tr');
                    if(tr) tr.classList.toggle('expanded');
                }
            });

            document.getElementById('leasesTable').addEventListener('change', async (e) => {
                if (e.target.classList.contains('yearInput')) {
                    const id = e.target.dataset.id;
                    const newYear = e.target.value;
                    const ref = doc(db, "leases", id);
                    const snap = await getDoc(ref);
                    const data = snap.data();
                    const yearlyData = data.yearlyData || {};
                    
                    if (yearlyData[newYear]) {
                        const yData = yearlyData[newYear];
                        await updateDoc(ref, {
                            year: newYear, ratePer33: yData.ratePer33, totalCost: yData.totalCost, paidAmount: yData.paidAmount, dueAmount: yData.dueAmount
                        });
                        showToast(`${newYear} সালের হিসাব লোড হয়েছে!`, 'success');
                    } else if (newYear !== data.year) {
                        showToast(`${newYear} সালের কোনো হিসাব এই জমিতে নেই।`, 'error');
                        e.target.value = data.year; 
                    }
                }
            });

            loadLeases();
        }

        // স্বয়ংক্রিয়ভাবে নতুন বছরে বকেয়া ট্রান্সফার (মাস অনুযায়ী)
        async function autoRollover() {
            let currentYear = new Date().getFullYear();
            let currentMonth = new Date().getMonth(); // 0-11
            let updates = [];
            
            for (let lease of allLeases) {
                if (lease.status === 'active') {
                    let yearVal = parseInt(lease.year);
                    if (isNaN(yearVal)) continue; 
                    
                    let cycleMonth = lease.cycleType === 'জ্যৈষ্ঠ' ? 5 : 0; 
                    let activeCycleYear = currentYear;
                    
                    if (currentMonth < cycleMonth) {
                        activeCycleYear = currentYear - 1;
                    }
                    
                    if (yearVal < activeCycleYear) {
                        let year = lease.year;
                        let yearlyData = lease.yearlyData || {};
                        let history = lease.history || [];
                        let due = parseFloat(lease.dueAmount);
                        let rate = parseFloat(lease.ratePer33);
                        let amount = parseFloat(lease.amount);
                        let totalCost = parseFloat(lease.totalCost);
                        let paidAmount = parseFloat(lease.paidAmount);
                        let updated = false;

                        while (parseInt(year) < activeCycleYear) {
                            let nextYear = (parseInt(year) + 1).toString();
                            
                            if (yearlyData[nextYear]) {
                                year = nextYear;
                                let yData = yearlyData[nextYear];
                                due = parseFloat(yData.dueAmount);
                                rate = parseFloat(yData.ratePer33);
                                totalCost = parseFloat(yData.totalCost);
                                paidAmount = parseFloat(yData.paidAmount);
                                continue;
                            }
                            
                            let nextRate = rate; 
                            let nextCost = (amount / 33) * nextRate;
                            let nextTotal = due + nextCost;
                            
                            if (!yearlyData[year]) {
                                yearlyData[year] = { ratePer33: rate, totalCost: totalCost.toFixed(2), paidAmount: paidAmount.toFixed(2), dueAmount: due.toFixed(2), status: 'transferred' };
                            } else {
                                yearlyData[year].status = 'transferred';
                            }
                            
                            yearlyData[nextYear] = { ratePer33: nextRate, totalCost: nextTotal.toFixed(2), paidAmount: 0, dueAmount: nextTotal.toFixed(2), status: 'active' };
                            history.push({ date: new Date().toLocaleDateString('bn-BD'), type: 'auto_rollover', fromYear: year, toYear: nextYear, carriedDue: due.toFixed(2) });
                            
                            year = nextYear;
                            due = nextTotal;
                            rate = nextRate;
                            totalCost = nextTotal;
                            paidAmount = 0;
                            updated = true;
                        }
                        
                        if (updated) {
                            updates.push(updateDoc(doc(db, "leases", lease.id), {
                                year: year,
                                ratePer33: rate,
                                totalCost: totalCost.toFixed(2),
                                paidAmount: 0,
                                dueAmount: due.toFixed(2),
                                history: history,
                                yearlyData: yearlyData
                            }));
                        }
                    }
                }
            }
            
            if (updates.length > 0) {
                await Promise.all(updates);
                showToast(`${updates.length} টি হিসাব স্বয়ংক্রিয়ভাবে নতুন হিসাব বর্ষে আপডেট হয়েছে।`, 'info');
            }
        }

        function loadLeases() {
            const q = collection(db, "leases");
            onSnapshot(q, (snapshot) => {
                allLeases = [];
                snapshot.forEach(d => allLeases.push({ id: d.id, ...d.data() }));
                autoRollover();
                renderTable();
            });
        }

            const tbody = document.getElementById('leasesTable');
            const paginationDiv = document.getElementById('pagination');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filteredLeases = allLeases.filter(lease => lease.farmerName.toLowerCase().includes(searchTerm));
            
            const totalPages = Math.ceil(filteredLeases.length / itemsPerPage);
            if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
            if (currentPage === 0 && totalPages > 0) currentPage = 1;

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paginatedLeases = filteredLeases.slice(start, end);

            if (paginatedLeases.length === 0) { 
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-slate-400 py-6">কোনো হিসাব পাওয়া যায়নি</td></tr>`; 
                paginationDiv.innerHTML = '';
                return; 
            }
            
            tbody.innerHTML = '';
            paginatedLeases.forEach(lease => {
                const id = lease.id;
                const tr = document.createElement('tr');
                
                const currentYearData = lease.yearlyData?.[lease.year] || {};

                if (isPaid && lease.status === 'active' && !isTransferred) {
                    dueHtml = `<span class="font-bold text-green-600 text-base">পরিশোধ</span>`;
                    collapsedDueHtml = `<span class="collapsed-paid">পরিশোধ</span>`;
                } else if (isTransferred) {
                    dueHtml = `<span class="text-indigo-600 text-xs font-bold">নতুন বছরে যোগ হয়েছে</span>`;
                    collapsedDueHtml = `<span class="collapsed-transferred">ট্রান্সফার্ড</span>`;
                } else if (lease.status === 'active') {
                    dueHtml = `<span class="font-bold text-red-600 text-base">${fmt(lease.dueAmount)}</span> <span class="text-xs">টাকা</span>

                    collapsedDueHtml = `<span class="collapsed-due">বকেয়া: ${fmt(lease.dueAmount)}</span>`;

                    collapsedDueHtml = `<span class="collapsed-due">নিষ্ক্রিয়</span>`;

                            </div>

                                <span class="text-xs text-cyan-600 font-bold">(${lease.cycleType})</span>
                            </div>
                        </div>
                    </td>
                    <td data-label="জমি / দর" class="p-3 align-top text-xs space-y-1 collapsible">
                        <div><span class="text-slate-400">জমি:</span> <b>${lease.amount}</b> শতাংশ</div>
                        <div><span class="text-slate-400">দর:</span> <b>${lease.ratePer33}</b> টাকা</div>
                    </td>
                    <td data-label="মোট / পরিশোধিত" class="p-3 align-top text-xs space-y-1 collapsible">
                        <div><span class="text-slate-400">মোট:</span> <b class="text-slate-800">${fmt(lease.totalCost)}</b> টাকা</div>
                        <div><span class="text-slate-400">জমা:</span> <b class="text-green-600">${fmt(lease.paidAmount)}</b> টাকা</div>
                    </td>
                    <td data-label="বকেয়া" class="p-3 align-top collapsible">${dueHtml}</td>

                            <button data-id="${id}" data-name="${lease.farmerName}" class="payBtn text-green-500 hover:bg-green-100 p-2 rounded-lg transition" title="পরিশোধ">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </button>
                            <button data-id="${id}" data-amount="${lease.amount}" class="transferBtn text-yellow-500 hover:bg-yellow-100 p-2 rounded-lg transition" title="ছেড়ে দিন">

                            </button>
                            <button data-id="${id}" data-year="${lease.year}" data-rate="${lease.ratePer33}" class="editBtn text-blue-500 hover:bg-blue-100 p-2 rounded-lg transition" title="এডিট দর">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button data-id="${id}" class="delBtn text-red-500 hover:bg-red-100 p-2 rounded-lg transition" title="ডিলিট">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>

            });

            paginationDiv.innerHTML = '';
            if (totalPages > 1) {
                const prevBtn = document.createElement('button');
                prevBtn.innerHTML = 'পূর্ববর্তী';
                prevBtn.className = 'px-3 py-1 bg-slate-200 rounded hover:bg-slate-300 text-sm';
                prevBtn.disabled = currentPage === 1;
                prevBtn.onclick = () => { currentPage--; renderTable(); };
                paginationDiv.appendChild(prevBtn);

                const pageText = document.createElement('span');
                pageText.className = 'text-sm text-slate-600';
                pageText.innerText = `পেজ ${currentPage} / ${totalPages}`;
                paginationDiv.appendChild(pageText);

                const nextBtn = document.createElement('button');
                nextBtn.innerHTML = 'পরবর্তী';
                nextBtn.className = 'px-3 py-1 bg-slate-200 rounded hover:bg-slate-300 text-sm';
                nextBtn.disabled = currentPage === totalPages;
                nextBtn.onclick = () => { currentPage++; renderTable(); };
                paginationDiv.appendChild(nextBtn);
            }
        }

        async function addLease(e) {
            e.preventDefault();
            const farmerName = document.getElementById('farmerName').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const ratePer33 = parseFloat(document.getElementById('ratePer33').value);
            const cycleType = document.getElementById('cycleType').value;
            const year = document.getElementById('year').value;
            const totalCost = fmt((amount / 33) * ratePer33);

            const yearlyData = {};
            yearlyData[year] = { ratePer33, totalCost: parseFloat(totalCost), paidAmount: 0, dueAmount: parseFloat(totalCost), status: 'active' };

            await addDoc(collection(db, "leases"), {
                farmerName, amount, cycleType, year, ratePer33,
                totalCost: parseFloat(totalCost), paidAmount: 0, dueAmount: parseFloat(totalCost),
                status: 'active', history: [], yearlyData: yearlyData
            });
            showToast('নতুন হিসাব যুক্ত হয়েছে!', 'success');
            document.getElementById('leaseForm').reset();
        }

                await deleteDoc(doc(db, "leases", id));
                showToast('হিসাব ডিলিট করা হয়েছে!', 'success');

                    <button class="absolute top-4 right-4 text-slate-400 hover:text-red-500 text-2xl" onclick="document.getElementById('modalContainer').classList.add('hidden')">&times;</button>

        async function openPaymentModal(id, name) {
            const q = query(collection(db, "leases"), where("farmerName", "==", name), where("status", "==", "active"));
            const snap = await getDocs(q);
            let options = '';
            snap.forEach(d => {
                const data = d.data();
                const currentYearData = data.yearlyData?.[data.year] || {};
                if (currentYearData.status !== 'transferred') {
                    const selected = d.id === id ? 'selected' : '';
                    options += `<option value="${d.id}" ${selected}>${data.amount} শতাংশ (দর: ${data.ratePer33}) - বকেয়া: ${fmt(data.dueAmount)} টাকা</option>`;
                }
            });

            openModal(`
                <h3 class="text-lg font-bold mb-1 text-slate-800">${name} - টাকা পরিশোধ</h3>
                <p class="text-xs text-slate-500 mb-4">একাধিক জমি থাকলে নির্দিষ্ট জমি সিলেক্ট করুন</p>
                <label class="text-sm text-slate-500">জমি নির্বাচন করুন</label>
                <select id="paySelect" class="w-full p-3 border rounded-lg mb-4 mt-1 bg-white">
                    ${options}
                </select>
                <input type="number" id="payAmount" placeholder="পরিশোধের পরিমাণ" class="w-full p-3 border rounded-lg mb-3" autofocus>
                <input type="date" id="payDate" class="w-full p-3 border rounded-lg mb-4" value="${new Date().toISOString().split('T')[0]}">
                <button id="confirmPay" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold hover:bg-green-700 flex justify-center">নিশ্চিত করুন</button>
                <button class="w-full bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300 mt-2" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল করুন</button>
            `);

            document.getElementById('confirmPay').onclick = async () => {
                const btn = document.getElementById('confirmPay');
                showSpinner(btn);
                const selectedId = document.getElementById('paySelect').value;
                const amount = parseFloat(document.getElementById('payAmount').value);
                const date = document.getElementById('payDate').value;
                if(isNaN(amount) || amount <= 0) { hideSpinner(btn); return showToast('সঠিক পরিমাণ লিখুন'); }

                const ref = doc(db, "leases", selectedId);
                const snap = await getDoc(ref);
                const data = snap.data();
                let newPaid = parseFloat(data.paidAmount) + amount;
                let newDue = parseFloat(data.totalCost) - newPaid;

                let adjustedMsg = '';
                if (newDue > 0 && newDue <= 30) {
                    adjustedMsg = `${fmt(newDue)} টাকা ক্ষুদ্র বকেয়া সমন্বয় করা হয়েছে।`;
                    newDue = 0;
                    newPaid = parseFloat(data.totalCost);
                }

                const history = data.history || [];
                history.push({ date, amount, type: 'payment' });

                const yearlyData = data.yearlyData || {};
                const currentYear = data.year;
                if (yearlyData[currentYear]) {
                    yearlyData[currentYear].paidAmount = fmt(newPaid);
                    yearlyData[currentYear].dueAmount = fmt(newDue);
                }

                await updateDoc(ref, { paidAmount: fmt(newPaid), dueAmount: fmt(newDue), history, yearlyData });
                
                if (adjustedMsg) showToast(adjustedMsg, 'info');
                else showToast('টাকা পরিশোধ সফল হয়েছে!', 'success');
                document.getElementById('modalContainer').classList.add('hidden');
            };
        }

        async function openTransferModal(id, totalAmount) {
            const q = query(collection(db, "leases"), where("status", "==", "active"));
            const snap = await getDocs(q);
            let farmers = [];
            snap.forEach(d => { if(d.id !== id) farmers.push(d.data().farmerName); });
            const uniqueFarmers = [...new Set(farmers)];
            const options = uniqueFarmers.map(f => `<option value="${f}">`).join('');

            openModal(`
                <h3 class="text-lg font-bold mb-4 text-slate-800">জমি হস্তান্তর / ছেড়ে দিন</h3>
                <p class="text-sm text-slate-500 mb-3">মোট জমি: <b>${totalAmount}</b> শতাংশ</p>
                <input type="number" step="0.01" id="transferAmount" placeholder="কত শতাংশ জমি দিবেন?" class="w-full p-3 border rounded-lg mb-3" autofocus>
                <datalist id="farmerList">${options}</datalist>
                <input type="text" id="newFarmerName" list="farmerList" placeholder="যাকে দিচ্ছেন তার নাম" class="w-full p-3 border rounded-lg mb-4">
                <button id="confirmTransfer" class="w-full bg-yellow-500 text-white p-3 rounded-lg font-bold hover:bg-yellow-600 flex justify-center">হস্তান্তর করুন</button>
                <button class="w-full bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300 mt-2" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল করুন</button>
            `);

            document.getElementById('confirmTransfer').onclick = async () => {
                const btn = document.getElementById('confirmTransfer');
                showSpinner(btn);
                const tAmount = parseFloat(document.getElementById('transferAmount').value);
                const newName = document.getElementById('newFarmerName').value;
                
                if(isNaN(tAmount) || tAmount <= 0 || tAmount > totalAmount) { hideSpinner(btn); return showToast('সঠিক জমির পরিমাণ দিন'); }
                if(!newName) { hideSpinner(btn); return showToast('নতুন চাষীর নাম দিন'); }

                const oldRef = doc(db, "leases", id);
                const oldSnap = await getDoc(oldRef);
                const oldData = oldSnap.data();

                const q2 = query(collection(db, "leases"), where("farmerName", "==", newName), where("status", "==", "active"));
                const newFarmerSnap = await getDocs(q2);

                const oldNewAmount = oldData.amount - tAmount;
                const oldNewTotal = fmt((oldNewAmount / 33) * oldData.ratePer33);
                const oldHistory = oldData.history || [];
                oldHistory.push({ date: new Date().toLocaleDateString('bn-BD'), amount: tAmount, type: 'transfer_out', to: newName });
                
                const oldYearlyData = oldData.yearlyData || {};
                const oldYear = oldData.year;
                if (oldYearlyData[oldYear]) {
                    oldYearlyData[oldYear].totalCost = parseFloat(oldNewTotal);
                    oldYearlyData[oldYear].dueAmount = parseFloat(oldNewTotal) - oldData.paidAmount;
                }

                await updateDoc(oldRef, { amount: oldNewAmount, totalCost: parseFloat(oldNewTotal), dueAmount: fmt(parseFloat(oldNewTotal) - oldData.paidAmount), history: oldHistory, yearlyData: oldYearlyData });

                if (!newFarmerSnap.empty) {
                    const newDoc = newFarmerSnap.docs[0];
                    const newData = newDoc.data();
                    const newAmount = newData.amount + tAmount;
                    const newTotal = fmt((newAmount / 33) * newData.ratePer33);
                    const newHistory = newData.history || [];
                    newHistory.push({ date: new Date().toLocaleDateString('bn-BD'), amount: tAmount, type: 'transfer_in', from: oldData.farmerName });
                    
                    const newYearlyData = newData.yearlyData || {};
                    const newYear = newData.year;
                    if (newYearlyData[newYear]) {
                        newYearlyData[newYear].totalCost = parseFloat(newTotal);
                        newYearlyData[newYear].dueAmount = fmt(parseFloat(newTotal) - newData.paidAmount);
                    }

                    await updateDoc(doc(db, "leases", newDoc.id), { 
                        amount: newAmount, totalCost: parseFloat(newTotal), dueAmount: fmt(parseFloat(newTotal) - newData.paidAmount), history: newHistory, yearlyData: newYearlyData 
                    });
                } else {
                    const newTotal = fmt((tAmount / 33) * oldData.ratePer33);
                    const newYearlyData = {};
                    newYearlyData[oldData.year] = { ratePer33: oldData.ratePer33, totalCost: parseFloat(newTotal), paidAmount: 0, dueAmount: parseFloat(newTotal), status: 'active' };
                    
                    await addDoc(collection(db, "leases"), {
                        farmerName: newName, amount: tAmount, ratePer33: oldData.ratePer33, cycleType: oldData.cycleType, year: oldData.year,
                        totalCost: parseFloat(newTotal), paidAmount: 0, dueAmount: parseFloat(newTotal), status: 'active',
                        history: [{ date: new Date().toLocaleDateString('bn-BD'), amount: tAmount, type: 'transfer_in', from: oldData.farmerName }],
                        yearlyData: newYearlyData
                    });
                }

                showToast('জমি সফলভাবে হস্তান্তর হয়েছে!', 'success');
                document.getElementById('modalContainer').classList.add('hidden');
            };
        }

        function openEditRateModal(id, currentYear, oldRate) {
            openModal(`
                <h3 class="text-lg font-bold mb-4 text-slate-800">দর এবং বছর পরিবর্তন</h3>
                <label class="text-sm text-slate-500">বর্তমান বছর: ${currentYear}</label>
                <input type="text" id="editYear" value="${currentYear}" placeholder="নতুন বছর" class="w-full p-3 border rounded-lg mb-3 mt-1">
                <label class="text-sm text-slate-500">বর্তমান দর: ${oldRate}</label>
                <input type="number" id="newRate" value="${oldRate}" placeholder="নতুন দর" class="w-full p-3 border rounded-lg mb-4 mt-1">
                <button id="confirmEdit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 flex justify-center">আপডেট করুন</button>
                <button class="w-full bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300 mt-2" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল করুন</button>
            `);
            document.getElementById('confirmEdit').onclick = async () => {
                const btn = document.getElementById('confirmEdit');
                showSpinner(btn);
                const newRate = parseFloat(document.getElementById('newRate').value);
                const newYear = document.getElementById('editYear').value;
                if(isNaN(newRate) || newRate <= 0 || !newYear) { hideSpinner(btn); return showToast('সঠিক তথ্য দিন'); }

                const ref = doc(db, "leases", id);
                const snap = await getDoc(ref);
                const data = snap.data();
                const newTotal = fmt((data.amount / 33) * newRate);
                const history = data.history || [];
                history.push({ date: new Date().toLocaleDateString('bn-BD'), type: 'edit', oldYear: data.year, newYear: newYear, oldRate: data.ratePer33, newRate: newRate });

                const yearlyData = data.yearlyData || {};
                if (yearlyData[newYear]) {
                    yearlyData[newYear].ratePer33 = newRate;
                    yearlyData[newYear].totalCost = parseFloat(newTotal);
                    yearlyData[newYear].dueAmount = fmt(parseFloat(newTotal) - yearlyData[newYear].paidAmount);
                } else {
                    yearlyData[newYear] = { ratePer33: newRate, totalCost: parseFloat(newTotal), paidAmount: 0, dueAmount: parseFloat(newTotal), status: 'active' };
                }

                await updateDoc(ref, { 
                    ratePer33: newRate, year: newYear, totalCost: yearlyData[newYear].totalCost, paidAmount: yearlyData[newYear].paidAmount, dueAmount: yearlyData[newYear].dueAmount, history, yearlyData 
                });
                
                showToast('দর এবং বছর আপডেট হয়েছে!', 'success');
                document.getElementById('modalContainer').classList.add('hidden');
            };
        }

        function openAdjustDueModal(id, name, oldYear, due) {
            const nextYear = (parseInt(oldYear) + 1).toString();
            openModal(`
                <h3 class="text-lg font-bold mb-2 text-slate-800">${name} - বকেয়া ট্রান্সফার</h3>
                <div class="bg-slate-50 p-3 rounded-lg mb-4 text-sm">
                    <p>বর্তমান বছর: <b>${oldYear}</b></p>
                    <p>বর্তমান বকেয়া: <b class="text-red-600">${fmt(due)} টাকা</b></p>
                </div>
                <label class="text-sm text-slate-500">নতুন হিসাব বর্ষ</label>
                <input type="text" id="adjustYear" value="${nextYear}" class="w-full p-3 border rounded-lg mb-3 mt-1">
                <label class="text-sm text-slate-500">নতুন বছরের দর (৩৩ শতাংশ)</label>
                <input type="number" id="adjustRate" placeholder="যেমন: ২০০০০" class="w-full p-3 border rounded-lg mb-4 mt-1">
                <button id="confirmAdjust" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold hover:bg-indigo-700 flex justify-center">নতুন বছরে নিন</button>
                <button class="w-full bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300 mt-2" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল করুন</button>
            `);

            document.getElementById('confirmAdjust').onclick = async () => {
                const btn = document.getElementById('confirmAdjust');
                showSpinner(btn);
                const newYear = document.getElementById('adjustYear').value;
                const newRate = parseFloat(document.getElementById('adjustRate').value);
                if(!newYear || isNaN(newRate)) { hideSpinner(btn); return showToast('সঠিক তথ্য দিন'); }

                const ref = doc(db, "leases", id);
                const snap = await getDoc(ref);
                const data = snap.data();
                const oldDue = parseFloat(data.dueAmount);
                const newYearCost = ((data.amount / 33) * newRate);
                const totalNewCost = oldDue + newYearCost;
                const history = data.history || [];
                history.push({ date: new Date().toLocaleDateString('bn-BD'), type: 'new_year', fromYear: data.year, toYear: newYear, carriedDue: fmt(oldDue) });

                const yearlyData = data.yearlyData || {};
                if (yearlyData[data.year]) {
                    yearlyData[data.year].status = 'transferred';
                } else {
                    yearlyData[data.year] = { ratePer33: data.ratePer33, totalCost: data.totalCost, paidAmount: data.paidAmount, dueAmount: oldDue, status: 'transferred' };
                }

                yearlyData[newYear] = { ratePer33: newRate, totalCost: fmt(totalNewCost), paidAmount: 0, dueAmount: fmt(totalNewCost), status: 'active' };

                await updateDoc(ref, { 
                    year: newYear, ratePer33: newRate, totalCost: fmt(totalNewCost), paidAmount: 0, dueAmount: fmt(totalNewCost), status: 'active', history, yearlyData 
                });

                showToast('নতুন হিসাব বর্ষ সফলভাবে শুরু হয়েছে!', 'success');
                document.getElementById('modalContainer').classList.add('hidden');
            };
        }

        async function openHistoryModal(farmerName) {
            const modal = document.getElementById('modalContainer');
            modal.classList.remove('hidden');
            modal.innerHTML = `<div class="bg-white rounded-2xl p-6 w-full max-w-md fade-in relative h-[80vh] flex flex-col"><div class="animate-pulse text-center py-10">লোড হচ্ছে...</div></div>`;
            modal.onclick = (e) => { if (e.target.id === 'modalContainer') modal.classList.add('hidden'); };

            const q = query(collection(db, "leases"), where("farmerName", "==", farmerName));
            const snap = await getDocs(q);
            
            let allHistory = [];
            snap.forEach(doc => {
                const data = doc.data();
                (data.history || []).forEach(h => {
                    allHistory.push({ ...h, context: `${data.year} (${data.amount} শতাংশ)` });
                });
            });

            let historyPage = 1;
            const historyPerPage = 10;

            function renderHistoryPage() {
                const totalPages = Math.ceil(allHistory.length / historyPerPage);
                const start = (historyPage - 1) * historyPerPage;
                const end = start + historyPerPage;
                const paginatedHistory = allHistory.slice(start, end);

                let historyHTML = '';
                paginatedHistory.forEach(h => {
                    historyHTML += `<div class="mb-3 border-l-4 border-indigo-200 pl-3">
                        <p class="font-bold text-xs text-slate-400">${h.context}</p>`;
                    historyHTML += `<ul class="mt-1 space-y-1 text-xs">`;
                    if(h.type === 'payment') historyHTML += `<li class="text-green-600 flex justify-between"><span>${h.date}</span> <span>+${fmt(h.amount)} টাকা জমা</span></li>`;
                    else if(h.type === 'transfer_out') historyHTML += `<li class="text-yellow-600 flex justify-between"><span>${h.date}</span> <span>${h.amount} শতাংশ হস্তান্তর (${h.to})</span></li>`;
                    else if(h.type === 'transfer_in') historyHTML += `<li class="text-blue-600 flex justify-between"><span>${h.date}</span> <span>${h.amount} শতাংশ পেয়েছেন (${h.from})</span></li>`;
                    else if(h.type === 'edit') historyHTML += `<li class="text-gray-500 flex justify-between"><span>${h.date}</span> <span>দর/বছর পরিবর্তন: ${h.oldRate}->${h.newRate}</span></li>`;
                    else if(h.type === 'auto_rollover') historyHTML += `<li class="text-purple-600 flex justify-between"><span>${h.date}</span> <span>${h.fromYear} থেকে ${h.toYear} সালে ${h.carriedDue} টাকা স্বয়ংক্রিয়ভাবে যোগ হয়েছে</span></li>`;
                    else if(h.type === 'new_year') historyHTML += `<li class="text-indigo-600 flex justify-between"><span>${h.date}</span> <span>${h.fromYear} থেকে ${h.toYear} সালে ${h.carriedDue} টাকা যোগ হয়েছে</span></li>`;
                    historyHTML += `</ul></div>`;
                });

                let paginationHTML = '';
                if (totalPages > 1) {
                    paginationHTML = `<div class="flex justify-center items-center gap-2 mt-4 pt-3 border-t">
                        <button id="prevHist" class="px-3 py-1 bg-slate-200 rounded text-sm ${historyPage === 1 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-slate-300'}">পূর্ববর্তী</button>
                        <span class="text-sm">${historyPage} / ${totalPages}</span>
                        <button id="nextHist" class="px-3 py-1 bg-slate-200 rounded text-sm ${historyPage === totalPages ? 'opacity-50 cursor-not-allowed' : 'hover:bg-slate-300'}">পরবর্তী</button>
                    </div>`;
                }

                modal.innerHTML = `
                    <div class="bg-white rounded-2xl p-6 w-full max-w-md fade-in relative h-[80vh] flex flex-col">
                        <button class="absolute top-4 right-4 text-slate-400 hover:text-red-500 text-2xl" onclick="document.getElementById('modalContainer').classList.add('hidden')">&times;</button>
                        <h3 class="text-lg font-bold mb-4 text-slate-800">${farmerName} এর ইতিহাস</h3>
                        <div class="flex-1 overflow-y-auto pr-2">
                            ${historyHTML || '<p class="text-slate-500 text-center py-4">কোনো ইতিহাস নেই।</p>'}
                        </div>
                        ${paginationHTML}
                    </div>
                `;

                const prevBtn = document.getElementById('prevHist');
                const nextBtn = document.getElementById('nextHist');
                if(prevBtn) prevBtn.onclick = () => { if(historyPage > 1) { historyPage--; renderHistoryPage(); } };
                if(nextBtn) nextBtn.onclick = () => { if(historyPage < totalPages) { historyPage++; renderHistoryPage(); } };
            }
            renderHistoryPage();
        }

    </script>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="app" class="min-h-screen">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-slate-400 animate-pulse">লোড হচ্ছে...</div>
        </div>
    </div>
</body>
</html>
