<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জমি লিজ ম্যানেজমেন্ট সিস্টেম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 5px; }
        .premium-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
        .expanded-view-content { display: none; }
        .collapsed-view { display: none; }
        @media (min-width: 768px) {
            .expanded-view-content { display: block !important; }
            .collapsed-view { display: none !important; }
        }
        @media (max-width: 767px) {
            .collapsed-view { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 2px 0; }
            .table-fixed thead { display: none; }
            .table-fixed, .table-fixed tbody, .table-fixed tr, .table-fixed td { display: block; width: 100%; }
            .table-fixed tbody tr { margin-bottom: 0.5rem; border: 1px solid #94a3b8; border-radius: 0.5rem; background: white; padding: 0.35rem 0.75rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.2s; }
            .table-fixed tbody tr.bg-red-50 { background-color: #fef2f2 !important; border-color: #ef4444 !important; }
            .table-fixed tbody tr.bg-orange-50 { background-color: #fff7ed !important; border-color: #f97316 !important; }
            .table-fixed td { padding: 0; margin: 0; border: none; text-align: right; font-size: 12px; }
            .table-fixed td::before { display: none; }
            .table-fixed td.collapsible { display: none; }
            .table-fixed td.mobile-hide { display: none !important; }
            .table-fixed td[data-label="চাষীর নাম ও সাল"] { padding: 0; cursor: pointer; }
            .collapsed-name { color: #dc2626; font-weight: 800; font-size: 15px; line-height: 1.1; }
            .collapsed-year { color: #0891b2; font-weight: 700; font-size: 11px; display: block; margin-top: -2px; }
            .collapsed-amount { color: #475569; font-size: 11px; font-weight: 600; text-align: center; }
            .collapsed-due { color: #dc2626; font-weight: 700; font-size: 13px; white-space: nowrap; text-align: right; }
            .collapsed-paid { color: #16a34a; font-weight: 700; font-size: 13px; }
            .collapsed-transferred { color: #4f46e5; font-weight: 700; font-size: 13px; }
            .collapsed-paused { color: #d97706; font-weight: 700; font-size: 13px; }
            .table-fixed tbody tr.expanded .collapsed-view { display: none !important; }
            .table-fixed tbody tr.expanded .expanded-view-content { display: block !important; }
            .table-fixed tbody tr.expanded { box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
            .table-fixed tbody tr.expanded td.collapsible { display: block; padding-top: 8px; border-top: 1px solid #e2e8f0; margin-top: 8px; }
            .table-fixed tbody tr.expanded td[data-label="অ্যাকশন"] { justify-content: flex-end; gap: 0.5rem; padding-top: 8px; border-top: 1px solid #e2e8f0; margin-top: 8px; display: flex; }
        }
        .toggle-checkbox:checked { right: 0; border-color: #6366f1; transform: translateX(100%); }
        .toggle-checkbox:checked + .toggle-label { background-color: #6366f1; }
        .toggle-checkbox { transition: all 0.3s ease; right: 0; }
        .toggle-label { transition: background-color 0.3s ease; }
        .lds-spinner { display: inline-block; position: relative; width: 80px; height: 80px; }
        .lds-spinner div { transform-origin: 40px 40px; animation: lds-spinner 1.2s linear infinite; }
        .lds-spinner div:after { content: " "; display: block; position: absolute; top: 3px; left: 37px; width: 6px; height: 18px; border-radius: 20%; }
        .lds-spinner div:nth-child(1) { transform: rotate(0deg); animation-delay: -1.1s; } .lds-spinner div:nth-child(1):after { background: #ef4444; }
        .lds-spinner div:nth-child(2) { transform: rotate(30deg); animation-delay: -1s; } .lds-spinner div:nth-child(2):after { background: #f97316; }
        .lds-spinner div:nth-child(3) { transform: rotate(60deg); animation-delay: -0.9s; } .lds-spinner div:nth-child(3):after { background: #eab308; }
        .lds-spinner div:nth-child(4) { transform: rotate(90deg); animation-delay: -0.8s; } .lds-spinner div:nth-child(4):after { background: #22c55e; }
        .lds-spinner div:nth-child(5) { transform: rotate(120deg); animation-delay: -0.7s; } .lds-spinner div:nth-child(5):after { background: #14b8a6; }
        .lds-spinner div:nth-child(6) { transform: rotate(150deg); animation-delay: -0.6s; } .lds-spinner div:nth-child(6):after { background: #06b6d4; }
        .lds-spinner div:nth-child(7) { transform: rotate(180deg); animation-delay: -0.5s; } .lds-spinner div:nth-child(7):after { background: #3b82f6; }
        .lds-spinner div:nth-child(8) { transform: rotate(210deg); animation-delay: -0.4s; } .lds-spinner div:nth-child(8):after { background: #6366f1; }
        .lds-spinner div:nth-child(9) { transform: rotate(240deg); animation-delay: -0.3s; } .lds-spinner div:nth-child(9):after { background: #8b5cf6; }
        .lds-spinner div:nth-child(10) { transform: rotate(270deg); animation-delay: -0.2s; } .lds-spinner div:nth-child(10):after { background: #a855f7; }
        .lds-spinner div:nth-child(11) { transform: rotate(300deg); animation-delay: -0.1s; } .lds-spinner div:nth-child(11):after { background: #d946ef; }
        .lds-spinner div:nth-child(12) { transform: rotate(330deg); animation-delay: 0s; } .lds-spinner div:nth-child(12):after { background: #ec4899; }
        @keyframes lds-spinner { 0% { opacity: 1; } 100% { opacity: 0; } }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, setDoc, doc, onSnapshot, updateDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const appContainer = document.getElementById('app');
        let idleTimer = null;
        let allLeases = [];
        let currentPage = 1;
        const itemsPerPage = 5;
        let expandedRows = new Set();
        /* ===== পরিবর্তন ৩: নতুন যুক্ত করা লিজকে autoRollover থেকে রক্ষা করার সেট ===== */
        let justCreatedIds = new Set();

        const fmt = (val) => (parseFloat(val) || 0).toFixed(2);

        const normalizeYear = (yearStr) => {
            if (!yearStr) return '';
            const bnDigits = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
            let str = String(yearStr);
            for (let i = 0; i < 10; i++) str = str.replace(new RegExp(bnDigits[i], 'g'), i);
            return str;
        };

        const monthNames = {
            bn: ['বৈশাখ','জ্যৈষ্ঠ','আষাঢ়','শ্রাবণ','ভাদ্র','আশ্বিন','কার্তিক','অগ্রহায়ণ','পৌষ','মাঘ','ফাল্গুন','চৈত্র'],
            en: ['January','February','March','April','May','June','July','August','September','October','November','December']
        };

        let audioCtx;
        function playSound(type) {
            try {
                audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
                if (type === 'error' || type === 'delete') {
                    const playTone = (freq, start, duration) => {
                        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime + start);
                        gain.gain.setValueAtTime(0, audioCtx.currentTime + start);
                        gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + start + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + start + duration);
                        osc.start(audioCtx.currentTime + start); osc.stop(audioCtx.currentTime + start + duration);
                    };
                    playTone(440, 0, 0.2); playTone(349.23, 0.2, 0.3);
                } else if (type === 'success') {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } else {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                }
            } catch(e) { console.error("Audio error", e); }
        }

        function customConfirm(message, type = 'warning') {
            return new Promise((resolve) => {
                playSound(type === 'delete' ? 'delete' : 'error');
                const colors = { delete: { bg: 'bg-red-50', border: 'border-red-500', btn: 'bg-red-500 hover:bg-red-600', icon: 'text-red-500' }, warning: { bg: 'bg-yellow-50', border: 'border-yellow-500', btn: 'bg-yellow-500 hover:bg-yellow-600', icon: 'text-yellow-500' }, info: { bg: 'bg-blue-50', border: 'border-blue-500', btn: 'bg-blue-500 hover:bg-blue-600', icon: 'text-blue-500' } };
                const c = colors[type] || colors.warning;
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 bg-black bg-opacity-50 z-[200] flex items-center justify-center p-4 fade-in';
                modal.innerHTML = `
                    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm text-center border-t-4 ${c.border}">
                        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full ${c.bg} mb-4">
                            <svg class="w-6 h-6 ${c.icon}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        </div>
                        <h3 class="text-lg font-bold mb-2 text-slate-800">নিশ্চিত করুন</h3>
                        <p class="text-sm text-slate-600 mb-6">${message}</p>
                        <div class="flex gap-3">
                            <button id="confirmBtn" class="flex-1 ${c.btn} text-white p-2 rounded-lg font-bold">ওকে</button>
                            <button id="cancelBtn" class="flex-1 bg-slate-200 text-slate-700 p-2 rounded-lg font-bold hover:bg-slate-300">বাতিল</button>
                        </div>
                    </div>`;
                document.body.appendChild(modal);
                modal.querySelector('#cancelBtn').onclick = () => { modal.remove(); resolve(false); };
                modal.querySelector('#confirmBtn').onclick = () => { modal.remove(); resolve(true); };
            });
        }

        /* ===== পরিবর্তন ১: admin123 এর বদলে সাইন-আপের পাসওয়ার্ড দিয়ে যাচাই ===== */
        function promptUserPassword(message) {
            return new Promise((resolve) => {
                playSound('error');
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 bg-black bg-opacity-50 z-[200] flex items-center justify-center p-4 fade-in';
                modal.innerHTML = `
                    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm text-center border-t-4 border-red-500">
                        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-50 mb-4">
                            <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <h3 class="text-lg font-bold mb-2 text-slate-800">পাসওয়ার্ড যাচাই</h3>
                        <p class="text-sm text-slate-600 mb-4">${message}</p>
                        <input type="password" id="userPassInput" class="w-full p-2 border rounded-lg mb-4 text-center" placeholder="আপনার সাইন-আপ পাসওয়ার্ড" autofocus>
                        <p id="passError" class="text-xs text-red-500 mb-3 h-4 font-bold"></p>
                        <div class="flex gap-3">
                            <button id="confirmBtn" class="flex-1 bg-red-500 text-white p-2 rounded-lg font-bold hover:bg-red-600">যাচাই করুন</button>
                            <button id="cancelBtn" class="flex-1 bg-slate-200 text-slate-700 p-2 rounded-lg font-bold hover:bg-slate-300">বাতিল</button>
                        </div>
                    </div>`;
                document.body.appendChild(modal);
                modal.querySelector('#cancelBtn').onclick = () => { modal.remove(); resolve(false); };
                const doVerify = async () => {
                    const pass = document.getElementById('userPassInput').value;
                    const errEl = document.getElementById('passError');
                    if (!pass) { errEl.innerText = 'পাসওয়ার্ড দিন।'; return; }
                    try {
                        const credential = EmailAuthProvider.credential(auth.currentUser.email, pass);
                        await reauthenticateWithCredential(auth.currentUser, credential);
                        modal.remove(); resolve(true);
                    } catch (err) {
                        errEl.innerText = 'পাসওয়ার্ড ভুল হয়েছে!';
                    }
                };
                modal.querySelector('#confirmBtn').onclick = doVerify;
                document.getElementById('userPassInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') doVerify(); });
            });
        }

        function showToast(msg, type = 'error', silent = false) {
            if (!silent) playSound(type);
            const colors = { error: 'bg-red-500', success: 'bg-green-500', info: 'bg-blue-500' };
            const toast = document.createElement('div');
            toast.className = `fixed top-5 right-5 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-xl z-[100] fade-in flex items-center`;
            toast.innerHTML = `<span>${msg}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function showSpinner(btn) { btn.disabled = true; btn.dataset.originalHtml = btn.innerHTML; btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`; }
        function hideSpinner(btn) { btn.disabled = false; btn.innerHTML = btn.dataset.originalHtml; }

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => signOut(auth).then(() => showToast('৫ মিনিট নিষ্ক্রিয়তার কারণে লগআউট হয়েছে', 'info')), 300000);
        }
        ['mousemove','keydown','click','scroll'].forEach(evt => window.addEventListener(evt, resetIdleTimer));

        function cleanError(err) {
            const errors = { 'auth/invalid-email': 'ইমেইল ঠিকানাটি সঠিক নয়।', 'auth/user-not-found': 'এই ইমেইল বা ইউজারনেম দিয়ে কোনো অ্যাকাউন্ট নেই।', 'auth/wrong-password': 'পাসওয়ার্ড ভুল হয়েছে।', 'auth/email-already-in-use': 'Email already exist', 'auth/weak-password': 'পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে।', 'auth/network-request-failed': 'নেটওয়ার্ক সমস্যা! ইন্টারনেট সংযোগ পরীক্ষা করুন।', 'permission-denied': 'অনুমতি নেই。', 'auth/invalid-credential': 'ইমেইল বা পাসওয়ার্ড ভুল হয়েছে।' };
            if (err && err.code && errors[err.code]) return errors[err.code];
            return 'কিছু একটা সমস্যা হয়েছে। আবার চেষ্টা করুন।';
        }

        function getMonthNumber(monthStr) {
            if (!monthStr) return 0;
            const m = monthStr.toLowerCase().trim();
            const map = { 'january':0,'february':1,'march':2,'april':3,'may':4,'june':5,'july':6,'august':7,'september':8,'october':9,'november':10,'december':11,'বৈশাখ':3,'জ্যৈষ্ঠ':4,'আষাঢ়':5,'শ্রাবণ':6,'ভাদ্র':7,'আশ্বিন':8,'কার্তিক':9,'অগ্রহায়ণ':10,'পৌষ':11,'মাঘ':0,'ফাল্গুন':1,'চৈত্র':2,'জানুয়ারি':0,'ফেব্রুয়ারি':1,'মার্চ':2,'এপ্রিল':3,'জুন':5,'জুলাই':6,'আগস্ট':7,'সেপ্টেম্বর':8,'অক্টোবর':9,'নভেম্বর':10,'ডিসেম্বর':11 };
            for (let key in map) if (m.includes(key)) return map[key];
            return 0;
        }

        onAuthStateChanged(auth, (user) => { if (user) renderDashboard(); else renderAuth(); });

        /* ===== অথেন্টিকেশন পেজ ===== */
        function renderAuth() {
            const savedIds = JSON.parse(localStorage.getItem('savedIdentifiers') || '[]');
            const optionsHtml = savedIds.map(id => `<option value="${id}">`).join('');
            appContainer.innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center bg-slate-200 p-4">
                    <div class="w-full max-w-md flex-1 flex flex-col justify-center">
                        <div class="text-center mb-8">
                            <div class="inline-block p-4 bg-white rounded-2xl shadow-lg mb-4 border border-slate-200">
                                <svg class="w-10 h-10 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21l1.65-3.8a9 9 0 113.4 2.9L3 21"></path></svg>
                            </div>
                            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">জমি লিজ ম্যানেজমেন্ট</h1>
                            <p class="text-slate-500 mt-2 text-sm">নিরাপদ ও স্মার্ট হিসাব ব্যবস্থাপনা</p>
                        </div>
                        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                            <div class="flex border-b border-slate-200">
                                <button id="tabLogin" class="flex-1 py-4 font-bold text-white bg-slate-800 transition relative">লগইন <span class="absolute bottom-0 left-1/4 right-1/4 h-1 bg-cyan-500"></span></button>
                                <button id="tabSignup" class="flex-1 py-4 font-bold text-slate-500 hover:text-slate-800 transition">সাইন আপ</button>
                            </div>
                            <div class="p-8 space-y-6">
                                <form id="loginForm" class="space-y-5">
                                    <div><label class="block text-xs font-medium text-slate-600 mb-1">ইমেইল অথবা ইউজারনেম</label><input type="text" id="loginIdentifier" name="loginIdentifier" list="identifierList" autocomplete="username" class="premium-input w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 outline-none transition" required><datalist id="identifierList">${optionsHtml}</datalist></div>

        /* ===== পরিবর্তন ৩: addLease - সাল ঠিকভাবে সেভ হবে ===== */
        async function addLease(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            showSpinner(btn);

            const farmerName = document.getElementById('farmerName').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const ratePer33 = parseFloat(document.getElementById('ratePer33').value);
            const cycleType = document.getElementById('cycleType').value;
            /* ফর্মে যে সাল লেখা হয়েছে সেটাই নেওয়া হচ্ছে, কোনো অটো পরিবর্তন নেই */
            const year = normalizeYear(document.getElementById('year').value);

            if (!year || isNaN(parseInt(year))) { hideSpinner(btn); return showToast('সঠিক সাল লিখুন।'); }

            const totalCost = (amount / 33) * ratePer33;

            try {
                const docRef = await addDoc(collection(db, "leases"), {
                    userId: auth.currentUser.uid,
                    farmerName,
                    amount,
                    ratePer33,
                    totalCost,
                    paidAmount: 0,
                    dueAmount: totalCost,
                    year: year,
                    cycleType,
                    status: 'active',
                    isPaused: false,
                    yearlyData: {},
                    history: [{
                        type: 'new',
                        date: new Date().toLocaleDateString('bn-BD'),
                        amount: amount,
                        rate: ratePer33
                    }]
                });

                /* নতুন তৈরি লিজের ID সেটে রাখা হচ্ছে যাতে autoRollover এটিকে স্কিপ করে */
                justCreatedIds.add(docRef.id);

                document.getElementById('modalContainer').classList.add('hidden');
                showToast('নতুন হিসাব যুক্ত হয়েছে!', 'success');
            } catch (err) {
                showToast(cleanError(err));
            }
            hideSpinner(btn);
        }

                    <h4 class="font-bold text-sm mb-3 text-slate-600 flex items-center gap-2"><svg class="w-4 h-4 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg> ডেটা স্থায়ীভাবে মুছুন</h4>
                    <div class="text-xs text-amber-700 mb-2 bg-amber-50 p-2 rounded border border-amber-200">
                        <strong>গুরুত্বপূর্ণ:</strong> তালিকায় সক্রিয় (active) থাকা চাষীদের কোনো ডেটা মুছবে না। শুধুমাত্র যাদের আগেই তালিকা থেকে ডিলিট করা হয়েছে (deleted status), তাদেরই ডেটা স্থায়ীভাবে মুছে যাবে।
                    </div>
                    <p class="text-xs text-red-500 mb-3 bg-red-50 p-2 rounded">সতর্কতা: এখানে সাল দিয়ে ডিলিট করলে তা ডাটাবেজ থেকে চিরতরে মুছে যাবে এবং পরবর্তীতে কোনো রিপোর্টে দেখা যাবে না। আপনার সাইন-আপ পাসওয়ার্ড দিয়ে যাচাই হবে।</p>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <input type="text" id="delStartYear" placeholder="শুরু সাল (যেমন: ২০২৩)" class="p-2 border rounded-lg text-sm">
                        <input type="text" id="delEndYear" placeholder="শেষ সাল (যেমন: ২০২৪)" class="p-2 border rounded-lg text-sm">
                    </div>
                    <button id="modalDeleteBtn" class="w-full bg-red-600 text-white p-2 rounded-lg font-semibold text-xs hover:bg-red-700 flex items-center justify-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        নির্বাচিত সালের ডেটা ডিলিট করুন
                    </button>
                </div>
                <button class="w-full bg-slate-200 text-slate-700 p-2 rounded-lg font-bold hover:bg-slate-300 mt-8 text-sm" onclick="document.getElementById('modalContainer').classList.add('hidden')">বন্ধ করুন</button>
            `);
            document.getElementById('modalExportPdf').addEventListener('click', () => exportData('pdf'));
            document.getElementById('modalExportExcel').addEventListener('click', () => exportData('excel'));
            document.getElementById('modalDeleteBtn').addEventListener('click', handleDataDelete);
        }

        /* ===== পরিবর্তন ১+২: handleDataDelete - সাইন-আপ পাসওয়ার্ড + active রক্ষা ===== */
        async function handleDataDelete() {
            let startYear = parseInt(normalizeYear(document.getElementById('delStartYear').value));
            let endYear = parseInt(normalizeYear(document.getElementById('delEndYear').value));

            if (isNaN(startYear) || isNaN(endYear)) return showToast('সঠিক সাল লিখুন।');
            if (startYear > endYear) return showToast('শুরুর সাল শেষের সালের চেয়ে বড় হতে পারবে না।');

            /* পরিবর্তন ১: admin123 এর বদলে সাইন-আপের পাসওয়ার্ড যাচাই */
            const isAuth = await promptUserPassword('এই ডেটা মুছে ফেলতে আপনার সাইন-আপ পাসওয়ার্ড দিন।');
            if (!isAuth) return;

            const isConfirmed = await customConfirm(`আপনি কি ${startYear} থেকে ${endYear} সাল পর্যন্ত ডিলিট করা (deleted) চাষীদের ডেটা স্থায়ীভাবে মুছে ফেলতে চান?\n\nসক্রিয় চাষীদের ডেটা কোনোভাবেই মুছবে না।`, "delete");
            if (!isConfirmed) return;

            showToast('ডেটা পরীক্ষা করা হচ্ছে...', 'info');

            const snap = await getDocs(query(collection(db, "leases"), where("userId", "==", auth.currentUser.uid)));
            let deletePromises = [];
            let skippedActive = 0;

            snap.forEach(d => {
                const data = d.data();

                /* পরিবর্তন ২: active স্ট্যাটাসের ডেটা সম্পূর্ণ স্কিপ */
                if (data.status !== 'deleted') {
                    skippedActive++;
                    return;
                }

                let leaseYearNum = parseInt(normalizeYear(data.year));

                if (leaseYearNum >= startYear && leaseYearNum <= endYear) {
                    deletePromises.push(deleteDoc(doc(db, "leases", d.id)));
                } else {
                    let yearlyData = data.yearlyData || {};
                    let updated = false;
                    for (let y in yearlyData) {
                        let yNum = parseInt(normalizeYear(y));
                        if (yNum >= startYear && yNum <= endYear) {
                            delete yearlyData[y];
                            updated = true;
                        }
                    }
                    if (updated) {
                        deletePromises.push(updateDoc(doc(db, "leases", d.id), { yearlyData }));
                    }
                }
            });

            if (deletePromises.length === 0) {
                if (skippedActive > 0) {
                    showToast(`${skippedActive} জন সক্রিয় চাষীর ডেটা নিরাপদ রাখা হয়েছে। এই সালের মধ্যে কোনো ডিলিট করা চাষী নেই।`, 'info');
                } else {
                    showToast('এই সালের মধ্যে কোনো ডেটা পাওয়া যায়নি।', 'info');
                }
                return;
            }

            try {
                await Promise.all(deletePromises);
                let msg = `নির্বাচিত সালের ${deletePromises.length}টি ডেটা সফলভাবে মুছে ফেলা হয়েছে।`;
                if (skippedActive > 0) msg += ` (${skippedActive} জন সক্রিয় চাষীর ডেটা নিরাপদ)`;
                showToast(msg, 'success');
                document.getElementById('modalContainer').classList.add('hidden');
            } catch (err) {
                showToast(cleanError(err));
            }
        }

        /* ===== রিপোর্ট এক্সপোর্ট ===== */
        async function exportData(type) {
            showToast('ডেটা প্রস্তুত হচ্ছে...', 'info');
            const snap = await getDocs(query(collection(db, "leases"), where("userId", "==", auth.currentUser.uid)));
            let allData = [];
            let historyData = [];

            snap.forEach(d => {
                const data = d.data();
                allData.push({
                    name: data.farmerName, year: data.year, amount: data.amount, rate: data.ratePer33,
                    total: data.totalCost, paid: data.paidAmount, due: data.dueAmount,
                    status: data.status === 'deleted' ? 'কার্ড থেকে ডিলিট করা' : (data.isPaused || data.yearlyData?.[data.year]?.isPaused ? 'স্থগিত' : 'সক্রিয়')
                });
                (data.history || []).forEach(h => {
                    let desc = '';
                    if (h.type === 'payment') desc = `${h.year || ''} সালের জমা: ${h.amount} টাকা`;
                    else if (h.type === 'transfer_out') desc = `${h.amount} শতাংশ ${h.to} কে হস্তান্তর`;
                    else if (h.type === 'transfer_in') desc = `${h.from} থেকে ${h.amount} শতাংশ পেয়েছেন`;
                    else if (h.type === 'edit') desc = `দর পরিবর্তন: ${h.oldRate} -> ${h.newRate}`;
                    else if (h.type === 'manage') desc = h.paused ? 'হিসাব স্থগিত' : 'হিসাব চালু';
                    else if (h.type === 'new_year') desc = `${h.fromYear} থেকে ${h.toYear} সালে ট্রান্সফার (বকেয়া: ${h.carriedDue})`;
                    else if (h.type === 'deleted') desc = 'তালিকা থেকে মুছে ফেলা হয়েছে';
                    else if (h.type === 'new') desc = `নতুন হিসাব: ${h.amount} শতাংশ, দর: ${h.rate}`;
                    historyData.push({ name: data.farmerName, date: h.date, description: desc });
                });
            });

            if (type === 'excel') {
                const wb = XLSX.utils.book_new();
                const ws1 = XLSX.utils.json_to_sheet(allData.map(d => ({
                    "চাষীর নাম": d.name, "বর্তমান সাল": d.year, "জমির পরিমাণ": d.amount, "দর": d.rate,
                    "মোট হারি": d.total, "জমা": d.paid, "বকেয়া": d.due, "স্ট্যাটাস": d.status
                })));
                XLSX.utils.book_append_sheet(wb, ws1, "সারাংশ");
                const ws2 = XLSX.utils.json_to_sheet(historyData.map(d => ({
                    "চাষীর নাম": d.name, "তারিখ": d.date, "বিবরণ": d.description
                })));
                XLSX.utils.book_append_sheet(wb, ws2, "বিস্তারিত ইতিহাস");
                XLSX.writeFile(wb, "জমির_হিসাব_রিপোর্ট.xlsx");
            } else if (type === 'pdf') {
                const win = window.open('', '_blank');
                let html = `<html><head><title>জমির হিসাব রিপোর্ট</title><style>
                    body { font-family: 'Hind Siliguri', sans-serif; padding: 20px; }
                    h1 { text-align: center; color: #1e293b; } h2 { margin-top: 30px; border-bottom: 2px solid #cbd5e1; padding-bottom: 5px; color: #334155; }
                    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
                    th, td { border: 1px solid #cbd5e1; padding: 6px; text-align: left; }
                    th { background-color: #f1f5f9; font-weight: bold; }
                </style><link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet"></head><body>
                <h1>জমির হিসাব ব্যবস্থাপনা রিপোর্ট</h1>
                <p style="text-align:center; color:#64748b;">তারিখ: ${new Date().toLocaleDateString('bn-BD')}</p>
                <h2>১. সারাংশ</h2><table><tr><th>নাম</th><th>সাল</th><th>জমি</th><th>দর</th><th>মোট হারি</th><th>জমা</th><th>বকেয়া</th><th>স্ট্যাটাস</th></tr>`;
                allData.forEach(d => { html += `<tr><td>${d.name}</td><td>${d.year}</td><td>${d.amount}</td><td>${d.rate}</td><td>${d.total}</td><td>${d.paid}</td><td>${d.due}</td><td>${d.status}</td></tr>`; });
                html += `</table><h2>২. বিস্তারিত ইতিহাস</h2><table><tr><th>নাম</th><th>তারিখ</th><th>বিবরণ</th></tr>`;
                historyData.forEach(d => { html += `<tr><td>${d.name}</td><td>${d.date}</td><td>${d.description}</td></tr>`; });
                html += `</table><script>window.onload = function() { window.print(); }<\/script></body></html>`;
                win.document.write(html);
                win.document.close();
            }
            showToast('রিপোর্ট ডাউনলোড হয়েছে!', 'success');
        }

        /* ===== লিজ লোড করা ===== */
        function loadLeases() {
            const q = query(collection(db, "leases"), where("userId", "==", auth.currentUser.uid));
            onSnapshot(q, (snap) => {
                allLeases = [];
                snap.forEach(d => {
                    allLeases.push({ id: d.id, ...d.data() });
                });
                autoRollover();
            });
        }

        /* ===== পরিবর্তন ৩: autoRollover - নতুন যুক্ত লিজকে স্কিপ করবে ===== */
        async function autoRollover() {
            const currentYear = String(new Date().getFullYear());
            const currentYearNum = new Date().getFullYear();
            let updates = [];

            for (let lease of allLeases) {
                /* নতুন যুক্ত করা লিজ হলে autoRollover স্কিপ - ফর্মে দেওয়া সাল যেন ঠিক থাকে */
                if (justCreatedIds.has(lease.id)) {
                    justCreatedIds.delete(lease.id);
                    continue;
                }

                if (lease.status !== 'active') continue;
                if (lease.isPaused) continue;

                const leaseYearNum = parseInt(normalizeYear(lease.year));
                if (leaseYearNum >= currentYearNum) continue;

                const yearlyData = { ...(lease.yearlyData || {}) };
                yearlyData[lease.year] = {
                    amount: lease.amount,
                    ratePer33: lease.ratePer33,
                    totalCost: lease.totalCost,
                    paidAmount: lease.paidAmount,
                    dueAmount: lease.dueAmount,
                    cycleType: lease.cycleType,
                    isPaused: lease.isPaused || false
                };

                const carriedDue = lease.dueAmount || 0;
                const newTotalCost = (lease.amount / 33) * lease.ratePer33;

                updates.push(updateDoc(doc(db, "leases", lease.id), {
                    year: currentYear,
                    yearlyData,
                    totalCost: newTotalCost,
                    paidAmount: 0,
                    dueAmount: carriedDue + newTotalCost,
                    isPaused: false,
                    history: [...(lease.history || []), {
                        type: 'new_year',
                        date: new Date().toLocaleDateString('bn-BD'),
                        fromYear: lease.year,
                        toYear: currentYear,
                        carriedDue: carriedDue
                    }]
                }));
            }

            if (updates.length > 0) {
                await Promise.all(updates);
                /* onSnapshot আবার ফায়ার করবে এবং renderTable হবে */
            } else {
                renderTable();
            }
        }

        /* ===== টেবিল রেন্ডার ===== */
        function renderTable() {
            const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
            const filtered = allLeases.filter(l =>
                l.farmerName.toLowerCase().includes(search) && l.status !== 'deleted'
            );

            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            if (currentPage > totalPages) currentPage = Math.max(1, totalPages);

            const start = (currentPage - 1) * itemsPerPage;
            const pageItems = filtered.slice(start, start + itemsPerPage);

            const tbody = document.getElementById('leasesTable');
            if (!tbody) return;

            if (pageItems.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-400">কোনো হিসাব নেই। "নতুন হিসাব" বাটনে ক্লিক করে শুরু করুন।</td></tr>`;
            } else {
                tbody.innerHTML = pageItems.map(lease => {
                    const isExpanded = expandedRows.has(lease.id);
                    const isPaused = lease.isPaused || lease.yearlyData?.[lease.year]?.isPaused;
                    let rowClass = '';
                    if (isPaused) rowClass = 'bg-orange-50';

                    const dueAmount = lease.dueAmount || 0;
                    const paidAmount = lease.paidAmount || 0;
                    const totalCost = lease.totalCost || 0;

                    return `<tr data-id="${lease.id}" class="${rowClass} ${isExpanded ? 'expanded' : ''}">
                        <td data-label="চাষীর নাম ও সাল">
                            <div class="collapsed-view">
                                <div>
                                    <span class="collapsed-name farmer-name" data-name="${lease.farmerName}">${lease.farmerName}</span>
                                    <span class="collapsed-year">${lease.year} | ${lease.cycleType || ''}</span>
                                </div>
                                <span class="collapsed-amount">${lease.amount} শতাংশ</span>
                                <span class="collapsed-due">${dueAmount > 0 ? fmt(dueAmount) : '—'}</span>
                            </div>
                            <div class="expanded-view-content">
                                <div class="flex items-center gap-2">
                                    <div>
                                        <div class="font-bold text-slate-800 farmer-name cursor-pointer hover:text-indigo-600" data-name="${lease.farmerName}">${lease.farmerName}</div>
                                        <div class="flex items-center gap-2 mt-1">
                                            <span class="text-cyan-600 font-semibold text-sm">${lease.year}</span>
                                            <input type="text" class="yearInput border rounded px-1 py-0.5 text-xs w-16 text-center" data-id="${lease.id}" value="${lease.year}" title="সাল পরিবর্তন করতে লিখুন">
                                            <span class="text-xs text-slate-400">${lease.cycleType || ''}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </td>
                        <td data-label="জমি / দর" class="collapsible">
                            <div class="text-sm">${lease.amount} শতাংশ</div>
                            <div class="text-xs text-slate-500">দর: ${lease.ratePer33}</div>
                        </td>
                        <td data-label="মোট হারি / পরিশোধিত" class="collapsible">
                            <div class="text-sm font-semibold">${fmt(totalCost)}</div>
                            <div class="text-xs text-green-600">জমা: ${fmt(paidAmount)}</div>
                        </td>
                        <td data-label="বকেয়া" class="collapsible">
                            <span class="font-bold ${dueAmount > 0 ? 'text-red-600' : 'text-green-600'}">${dueAmount > 0 ? fmt(dueAmount) : 'শূন্য'}</span>
                            ${isPaused ? '<span class="block text-xs text-orange-600 font-bold mt-1">স্থগিত</span>' : ''}
                        </td>
                        <td data-label="অ্যাকশন" class="collapsible">
                            <div class="flex flex-wrap gap-1 justify-end">
                                <button class="payBtn bg-green-500 text-white px-2 py-1 rounded text-xs hover:bg-green-600" data-id="${lease.id}" data-name="${lease.farmerName}">জমা</button>
                                <button class="transferBtn bg-blue-500 text-white px-2 py-1 rounded text-xs hover:bg-blue-600" data-id="${lease.id}" data-amount="${lease.amount}">হস্তান্তর</button>
                                <button class="editBtn bg-amber-500 text-white px-2 py-1 rounded text-xs hover:bg-amber-600" data-id="${lease.id}" data-year="${lease.year}" data-rate="${lease.ratePer33}">দর</button>
                                <button class="adjustBtn bg-purple-500 text-white px-2 py-1 rounded text-xs hover:bg-purple-600" data-id="${lease.id}" data-name="${lease.farmerName}" data-year="${lease.year}" data-due="${dueAmount}">সমন্বয়</button>
                                <button class="manageBtn bg-teal-500 text-white px-2 py-1 rounded text-xs hover:bg-teal-600" data-id="${lease.id}">${isPaused ? 'চালু' : 'স্থগিত'}</button>
                                <button class="delBtn bg-red-500 text-white px-2 py-1 rounded text-xs hover:bg-red-600" data-id="${lease.id}">ডিলিট</button>
                            </div>
                        </td>
                    </tr>`;
                }).join('');
            }

            /* পেজিনেশন */
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) {
                pagination.innerHTML = `<span class="text-xs text-slate-400">মোট: ${filtered.length}টি</span>`;
            } else {
                let btns = `<span class="text-xs text-slate-400 mr-2">মোট: ${filtered.length}টি</span>`;
                if (currentPage > 1) btns += `<button class="px-3 py-1 rounded bg-slate-200 hover:bg-slate-300 text-sm" onclick="goToPage(${currentPage - 1})">পূর্ববর্তী</button>`;
                for (let i = 1; i <= totalPages; i++) {
                    btns += `<button class="px-3 py-1 rounded text-sm ${i === currentPage ? 'bg-indigo-600 text-white' : 'bg-slate-200 hover:bg-slate-300'}" onclick="goToPage(${i})">${i}</button>`;
                }
                if (currentPage < totalPages) btns += `<button class="px-3 py-1 rounded bg-slate-200 hover:bg-slate-300 text-sm" onclick="goToPage(${currentPage + 1})">পরবর্তী</button>`;
                pagination.innerHTML = btns;
            }
        }

        window.goToPage = function(page) { currentPage = page; renderTable(); };

        /* ===== জমা মোডাল ===== */
        function openPaymentModal(id, name) {
            openModal(`
                <h3 class="text-lg font-bold mb-4">${name} - জমা</h3>
                <form id="paymentForm" class="space-y-4">
                    <div><label class="block text-sm font-medium mb-1">জমার পরিমাণ (টাকা)</label>
                    <input type="number" id="payAmount" class="w-full p-3 border rounded-lg" required></div>
                    <div class="flex gap-3">
                        <button type="submit" class="flex-1 bg-green-600 text-white p-3 rounded-lg font-bold hover:bg-green-700">জমা দিন</button>
                        <button type="button" class="flex-1 bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল</button>
                    </div>
                </form>
            `);
            document.getElementById('paymentForm').onsubmit = async (e) => {
                e.preventDefault();
                const amount = parseFloat(document.getElementById('payAmount').value);
                if (isNaN(amount) || amount <= 0) return showToast('সঠিক পরিমাণ দিন।');
                const lease = allLeases.find(l => l.id === id);
                if (!lease) return;

                const newPaid = (lease.paidAmount || 0) + amount;
                const newDue = Math.max(0, (lease.dueAmount || 0) - amount);

                try {
                    await updateDoc(doc(db, "leases", id), {
                        paidAmount: newPaid,
                        dueAmount: newDue,
                        history: [...(lease.history || []), {
                            type: 'payment',
                            date: new Date().toLocaleDateString('bn-BD'),
                            year: lease.year,
                            amount: amount
                        }]
                    });
                    document.getElementById('modalContainer').classList.add('hidden');
                    showToast('জমা সফল হয়েছে!', 'success');
                } catch (err) { showToast(cleanError(err)); }
            };
        }

        /* ===== হস্তান্তর মোডাল ===== */
        function openTransferModal(id, amount) {
            openModal(`
                <h3 class="text-lg font-bold mb-4">জমি হস্তান্তর</h3>
                <form id="transferForm" class="space-y-4">
                    <div class="text-sm text-slate-600 bg-slate-50 p-2 rounded">বর্তমান জমি: <strong>${amount}</strong> শতাংশ</div>
                    <div><label class="block text-sm font-medium mb-1">হস্তান্তরের পরিমাণ (শতাংশ)</label>
                    <input type="number" step="0.01" id="transferAmount" class="w-full p-3 border rounded-lg" max="${amount}" required></div>
                    <div><label class="block text-sm font-medium mb-1">প্রাপকের নাম</label>
                    <input type="text" id="transferTo" class="w-full p-3 border rounded-lg" required></div>
                    <div class="flex gap-3">
                        <button type="submit" class="flex-1 bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700">হস্তান্তর করুন</button>
                        <button type="button" class="flex-1 bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল</button>
                    </div>
                </form>
            `);
            document.getElementById('transferForm').onsubmit = async (e) => {
                e.preventDefault();
                const tAmount = parseFloat(document.getElementById('transferAmount').value);
                const to = document.getElementById('transferTo').value.trim();
                const lease = allLeases.find(l => l.id === id);
                if (!lease) return;
                if (tAmount <= 0 || tAmount > lease.amount) return showToast('হস্তান্তরের পরিমাণ বৈধ নয়।');
                if (!to) return showToast('প্রাপকের নাম দিন।');

                const newAmount = parseFloat((lease.amount - tAmount).toFixed(4));
                const newTotalCost = (newAmount / 33) * lease.ratePer33;
                const ratio = newAmount / lease.amount;
                const newPaid = parseFloat(((lease.paidAmount || 0) * ratio).toFixed(2));
                const newDue = parseFloat(Math.max(0, newTotalCost - newPaid).toFixed(2));

                try {
                    await updateDoc(doc(db, "leases", id), {
                        amount: newAmount, totalCost: newTotalCost, paidAmount: newPaid, dueAmount: newDue,
                        history: [...(lease.history || []), { type: 'transfer_out', date: new Date().toLocaleDateString('bn-BD'), amount: tAmount, to: to }]
                    });

                    const recipientTotalCost = (tAmount / 33) * lease.ratePer33;
                    const newDocRef = await addDoc(collection(db, "leases"), {
                        userId: auth.currentUser.uid, farmerName: to, amount: tAmount, ratePer33: lease.ratePer33,
                        totalCost: recipientTotalCost, paidAmount: 0, dueAmount: recipientTotalCost,
                        year: lease.year, cycleType: lease.cycleType, status: 'active', isPaused: false, yearlyData: {},
                        history: [{ type: 'transfer_in', date: new Date().toLocaleDateString('bn-BD'), from: lease.farmerName, amount: tAmount }]
                    });
                    justCreatedIds.add(newDocRef.id);

                    document.getElementById('modalContainer').classList.add('hidden');
                    showToast('হস্তান্তর সফল হয়েছে!', 'success');
                } catch (err) { showToast(cleanError(err)); }
            };
        }

        /* ===== দর পরিবর্তন মোডাল ===== */
        function openEditRateModal(id, year, rate) {
            openModal(`
                <h3 class="text-lg font-bold mb-4">${year} সালের দর পরিবর্তন</h3>
                <form id="editRateForm" class="space-y-4">
                    <div class="text-sm text-slate-600 bg-slate-50 p-2 rounded">বর্তমান দর: <strong>${rate}</strong></div>
                    <div><label class="block text-sm font-medium mb-1">নতুন দর (প্রতি ৩৩ শতাংশে)</label>
                    <input type="number" id="newRate" class="w-full p-3 border rounded-lg" value="${rate}" required></div>
                    <div class="flex gap-3">
                        <button type="submit" class="flex-1 bg-amber-600 text-white p-3 rounded-lg font-bold hover:bg-amber-700">পরিবর্তন করুন</button>
                        <button type="button" class="flex-1 bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল</button>
                    </div>
                </form>
            `);
            document.getElementById('editRateForm').onsubmit = async (e) => {
                e.preventDefault();
                const newRate = parseFloat(document.getElementById('newRate').value);
                const lease = allLeases.find(l => l.id === id);
                if (!lease) return;
                if (isNaN(newRate) || newRate <= 0) return showToast('সঠিক দর দিন।');

                const newTotalCost = (lease.amount / 33) * newRate;
                const newDue = parseFloat(Math.max(0, newTotalCost - (lease.paidAmount || 0)).toFixed(2));

                try {
                    await updateDoc(doc(db, "leases", id), {
                        ratePer33: newRate, totalCost: newTotalCost, dueAmount: newDue,
                        history: [...(lease.history || []), { type: 'edit', date: new Date().toLocaleDateString('bn-BD'), oldRate: lease.ratePer33, newRate: newRate }]
                    });
                    document.getElementById('modalContainer').classList.add('hidden');
                    showToast('দর পরিবর্তন সফল!', 'success');
                } catch (err) { showToast(cleanError(err)); }
            };
        }

        /* ===== সফট ডিলিট (তালিকা থেকে) ===== */
        async function handleDelete(id) {
            const lease = allLeases.find(l => l.id === id);
            if (!lease) return;

            const confirmed = await customConfirm(`"${lease.farmerName}" কে তালিকা থেকে মুছে ফেলতে চান?\n\nডাটাবেজে ডেটা থাকবে। পরে "ডেটাবেস" থেকে স্থায়ীভাবে মুছতে পারবেন।`, 'delete');
            if (!confirmed) return;

            try {
                await updateDoc(doc(db, "leases", id), {
                    status: 'deleted',
                    history: [...(lease.history || []), { type: 'deleted', date: new Date().toLocaleDateString('bn-BD') }]
                });
                showToast('তালিকা থেকে মুছে ফেলা হয়েছে।', 'success');
            } catch (err) { showToast(cleanError(err)); }
        }

        /* ===== বকেয়া সমন্বয় মোডাল ===== */
        function openAdjustDueModal(id, name, year, due) {
            openModal(`
                <h3 class="text-lg font-bold mb-4">${name} - বকেয়া সমন্বয় (${year})</h3>
                <form id="adjustForm" class="space-y-4">
                    <div class="text-sm text-slate-600 bg-slate-50 p-2 rounded">বর্তমান বকেয়া: <strong class="text-red-600">${fmt(due)}</strong> টাকা</div>
                    <div><label class="block text-sm font-medium mb-1">নতুন বকেয়া (টাকা)</label>
                    <input type="number" id="newDue" class="w-full p-3 border rounded-lg" value="${due}" required></div>
                    <div class="flex gap-3">
                        <button type="submit" class="flex-1 bg-purple-600 text-white p-3 rounded-lg font-bold hover:bg-purple-700">সমন্বয় করুন</button>
                        <button type="button" class="flex-1 bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল</button>
                    </div>
                </form>
            `);
            document.getElementById('adjustForm').onsubmit = async (e) => {
                e.preventDefault();
                const newDueAmount = parseFloat(document.getElementById('newDue').value);
                if (isNaN(newDueAmount) || newDueAmount < 0) return showToast('সঠিক পরিমাণ দিন।');
                try {
                    await updateDoc(doc(db, "leases", id), { dueAmount: newDueAmount });
                    document.getElementById('modalContainer').classList.add('hidden');
                    showToast('বকেয়া সমন্বয় সফল!', 'success');
                } catch (err) { showToast(cleanError(err)); }
            };
        }

        /* ===== হিসাব স্থগিত/চালু মোডাল ===== */
        function openManageAccountModal(id) {
            const lease = allLeases.find(l => l.id === id);
            if (!lease) return;
            const isPaused = lease.isPaused || false;
            const action = isPaused ? 'চালু' : 'স্থগিত';
            const color = isPaused ? 'green' : 'orange';

            openModal(`
                <h3 class="text-lg font-bold mb-4">হিসাব ${action} করুন</h3>
                <div class="bg-${color}-50 border border-${color}-200 rounded-lg p-4 mb-4">
                    <p class="text-sm text-slate-700"><strong>${lease.farmerName}</strong> এর ${lease.year} সালের হিসাব <strong class="text-${color}-600">${action}</strong> করতে চান?</p>
                    ${!isPaused ? '<p class="text-xs text-slate-500 mt-1">স্থগিত করলে এই সালের হিসাব বকেয়া হিসেবে বহন করবে এবং অটো রোলওভার থেকে বাদ পড়বে।</p>' : '<p class="text-xs text-slate-500 mt-1">চালু করলে হিসাব স্বাভাবিকভাবে চলবে।</p>'}
                </div>
                <div class="flex gap-3">
                    <button id="confirmManage" class="flex-1 bg-${color}-600 text-white p-3 rounded-lg font-bold hover:bg-${color}-700">${action} করুন</button>
                    <button class="flex-1 bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল</button>
                </div>
            `);
            document.getElementById('confirmManage').onclick = async () => {
                try {
                    await updateDoc(doc(db, "leases", id), {
                        isPaused: !isPaused,
                        history: [...(lease.history || []), { type: 'manage', date: new Date().toLocaleDateString('bn-BD'), paused: !isPaused }]
                    });
                    document.getElementById('modalContainer').classList.add('hidden');
                    showToast(`হিসাব ${action} করা হয়েছে!`, 'success');
                } catch (err) { showToast(cleanError(err)); }
            };
        }

        /* ===== ইতিহাস মোডাল ===== */
        function openHistoryModal(name) {
            /* একই নামের সব লিজের ইতিহাস একত্রিত করা */
            const matchingLeases = allLeases.filter(l => l.farmerName === name);
            let allHistory = [];
            matchingLeases.forEach(lease => {
                (lease.history || []).forEach(h => {
                    let desc = '';
                    let yearLabel = h.year || lease.year || '';
                    if (h.type === 'new') desc = `নতুন হিসাব খোলা হয়েছে: ${h.amount} শতাংশ, দর: ${h.rate} টাকা (${yearLabel})`;
                    else if (h.type === 'payment') desc = `${yearLabel} সালের জমা: ${h.amount} টাকা`;
                    else if (h.type === 'transfer_out') desc = `${h.amount} শতাংশ জমি "${h.to}" কে হস্তান্তর করা হয়েছে`;
                    else if (h.type === 'transfer_in') desc = `"${h.from}" থেকে ${h.amount} শতাংশ জমি পেয়েছেন`;
                    else if (h.type === 'edit') desc = `দর পরিবর্তন: ${h.oldRate} → ${h.newRate} টাকা (${yearLabel})`;
                    else if (h.type === 'manage') desc = h.paused ? `হিসাব স্থগিত করা হয়েছে (${yearLabel})` : `হিসাব পুনরায় চালু করা হয়েছে (${yearLabel})`;
                    else if (h.type === 'new_year') desc = `${h.fromYear} → ${h.toYear} সালে স্বয়ংক্রিয় রোলওভার (বহনকৃত বকেয়া: ${fmt(h.carriedDue)} টাকা)`;
                    else if (h.type === 'deleted') desc = `তালিকা থেকে মুছে ফেলা হয়েছে (${yearLabel})`;
                    if (desc) allHistory.push({ date: h.date, desc, status: lease.status });
                });
            });

            /* নতুনের পরে থেকে পুরনোর দিকে সাজানো */
            allHistory.reverse();

            const html = allHistory.length === 0
                ? '<p class="text-slate-400 text-center py-8">কোনো ইতিহাস পাওয়া যায়নি।</p>'
                : allHistory.map(h => `
                    <div class="flex justify-between items-start py-3 border-b border-slate-100 last:border-0 gap-2">
                        <span class="text-sm text-slate-700">${h.desc}</span>
                        <span class="text-xs text-slate-400 whitespace-nowrap flex-shrink-0">${h.date}</span>
                    </div>
                `).join('');

            openModal(`
                <h3 class="text-lg font-bold mb-1 text-slate-800">${name}</h3>
                <p class="text-xs text-slate-400 mb-4">সম্পূর্ণ লেনদেন ইতিহাস</p>
                <div class="max-h-96 overflow-y-auto pr-1">${html}</div>
                <button class="w-full bg-slate-200 text-slate-700 p-2 rounded-lg font-bold hover:bg-slate-300 mt-4" onclick="document.getElementById('modalContainer').classList.add('hidden')">বন্ধ করুন</button>
            `);
        }
    </script>
</body>
</html>
