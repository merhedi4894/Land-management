        }
        .lds-spinner { display: inline-block; position: relative; width: 80px; height: 80px; }
        .lds-spinner div { transform-origin: 40px 40px; animation: lds-spinner 1.2s linear infinite; }

        .lds-spinner div:nth-child(1) { transform: rotate(0deg); animation-delay: -1.1s; } .lds-spinner div:nth-child(1):after { background: #ef4444; }
        .lds-spinner div:nth-child(2) { transform: rotate(30deg); animation-delay: -1s; } .lds-spinner div:nth-child(2):after { background: #f97316; }
        .lds-spinner div:nth-child(3) { transform: rotate(60deg); animation-delay: -0.9s; } .lds-spinner div:nth-child(3):after { background: #eab308; }
        .lds-spinner div:nth-child(4) { transform: rotate(90deg); animation-delay: -0.8s; } .lds-spinner div:nth-child(4):after { background: #22c55e; }
        .lds-spinner div:nth-child(5) { transform: rotate(120deg); animation-delay: -0.7s; } .lds-spinner div:nth-child(5):after { background: #14b8a6; }
        .lds-spinner div:nth-child(6) { transform: rotate(150deg); animation-delay: -0.6s; } .lds-spinner div:nth-child(6):after { background: #06b6d4; }
        .lds-spinner div:nth-child(7) { transform: rotate(180deg); animation-delay: -0.5s; } .lds-spinner div:nth-child(7):after { background: #3b82f6; }
        .lds-spinner div:nth-child(8) { transform: rotate(210deg); animation-delay: -0.4s; } .lds-spinner div:nth-child(8):after { background: #6366f1; }
        .lds-spinner div:nth-child(9) { transform: rotate(240deg); animation-delay: -0.3s; } .lds-spinner div:nth-child(9):after { background: #8b5cf6; }
        .lds-spinner div:nth-child(10) { transform: rotate(270deg); animation-delay: -0.2s; } .lds-spinner div:nth-child(10):after { background: #a855f7; }
        .lds-spinner div:nth-child(11) { transform: rotate(300deg); animation-delay: -0.1s; } .lds-spinner div:nth-child(11):after { background: #d946ef; }
        .lds-spinner div:nth-child(12) { transform: rotate(330deg); animation-delay: 0s; } .lds-spinner div:nth-child(12):after { background: #ec4899; }
        @keyframes lds-spinner { 0% { opacity: 1; } 100% { opacity: 0; } }

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, setDoc, doc, onSnapshot, updateDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZhV6G0D-fTrH2auEqgtz72DGrBHpgFDU",
            authDomain: "lease-management-c7c35.firebaseapp.com",
            projectId: "lease-management-c7c35",
            storageBucket: "lease-management-c7c35.firebasestorage.app",
            messagingSenderId: "182624418687",
            appId: "1:182624418687:web:6e5964459b5c2287f5384a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const appContainer = document.getElementById('app');
        let idleTimer = null;
        let allLeases = [];
        let currentPage = 1;
        const itemsPerPage = 5;
        let expandedRows = new Set();
        let justCreatedIds = new Set();

        const fmt = (val) => (parseFloat(val) || 0).toFixed(2);

        const normalizeYear = (yearStr) => {
            if (!yearStr) return '';
            const bnDigits = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
            let str = String(yearStr);
            for (let i = 0; i < 10; i++) str = str.replace(new RegExp(bnDigits[i], 'g'), i);
            return str;
        };

        const monthNames = {
            bn: ['বৈশাখ','জ্যৈষ্ঠ','আষাঢ়','শ্রাবণ','ভাদ্র','আশ্বিন','কার্তিক','অগ্রহায়ণ','পৌষ','মাঘ','ফাল্গুন','চৈত্র'],
            en: ['January','February','March','April','May','June','July','August','September','October','November','December']
        };

        /* ===== পূর্বের সালের বকেয়া বের করা ===== */
        function getPreviousYearsDues(lease) {
            const yearlyData = lease.yearlyData || {};
            const dues = [];
            for (let y in yearlyData) {
                if ((yearlyData[y].dueAmount || 0) > 0) {
                    dues.push({ year: y, due: yearlyData[y].dueAmount });
                }
            }
            dues.sort((a, b) => parseInt(b.year) - parseInt(a.year));
            return dues;
        }

        /* ===== ডিসপ্লের জন্য মোট বকেয়া ও সালের তালিকা ===== */
        function getDisplayDues(lease) {
            const isPaused = lease.isPaused || false;
            let totalDue = 0;
            let yearsWithDues = [];

            if (!isPaused) {
                totalDue = lease.dueAmount || 0;
                if (totalDue > 0) yearsWithDues.push(lease.year);
            }

            const yearlyData = lease.yearlyData || {};
            for (let y in yearlyData) {
                const yDue = yearlyData[y].dueAmount || 0;
                if (yDue > 0) {
                    if (isPaused) {
                        totalDue += yDue;
                        yearsWithDues.push(y);
                    } else if (y !== lease.year) {
                        yearsWithDues.push(y);
                    }
                }
            }
            yearsWithDues.sort((a, b) => parseInt(a) - parseInt(b));
            return { totalDue, yearsWithDues };
        }

        /* ===== সালের তালিকা ফরম্যাট করা ===== */
        function formatYearsList(years) {
            if (years.length === 0) return '';
            if (years.length === 1) return years[0];
            if (years.length === 2) return years.join(' এবং ');
            return years.slice(0, -1).join(', ') + ' এবং ' + years[years.length - 1];
        }

        let audioCtx;
        function playSound(type) {
            try {
                audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
                if (type === 'error' || type === 'delete') {
                    const playTone = (freq, start, duration) => {
                        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime + start);
                        gain.gain.setValueAtTime(0, audioCtx.currentTime + start);
                        gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + start + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + start + duration);
                        osc.start(audioCtx.currentTime + start); osc.stop(audioCtx.currentTime + start + duration);
                    };
                    playTone(440, 0, 0.2); playTone(349.23, 0.2, 0.3);
                } else if (type === 'success') {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } else {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                }
            } catch(e) {}
        }

        function customConfirm(message, type = 'warning') {
            return new Promise((resolve) => {
                playSound(type === 'delete' ? 'delete' : 'error');
                const colors = { delete: { bg: 'bg-red-50', border: 'border-red-500', btn: 'bg-red-500 hover:bg-red-600', icon: 'text-red-500' }, warning: { bg: 'bg-yellow-50', border: 'border-yellow-500', btn: 'bg-yellow-500 hover:bg-yellow-600', icon: 'text-yellow-500' }, info: { bg: 'bg-blue-50', border: 'border-blue-500', btn: 'bg-blue-500 hover:bg-blue-600', icon: 'text-blue-500' } };
                const c = colors[type] || colors.warning;
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 bg-black bg-opacity-50 z-[200] flex items-center justify-center p-4 fade-in';
                modal.innerHTML = `
                    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm text-center border-t-4 ${c.border}">
                        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full ${c.bg} mb-4">
                            <svg class="w-6 h-6 ${c.icon}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        </div>
                        <h3 class="text-lg font-bold mb-2 text-slate-800">নিশ্চিত করুন</h3>
                        <p class="text-sm text-slate-600 mb-6 whitespace-pre-line">${message}</p>
                        <div class="flex gap-3">
                            <button id="confirmBtn" class="flex-1 ${c.btn} text-white p-2 rounded-lg font-bold">ওকে</button>
                            <button id="cancelBtn" class="flex-1 bg-slate-200 text-slate-700 p-2 rounded-lg font-bold hover:bg-slate-300">বাতিল</button>
                        </div>
                    </div>`;
                document.body.appendChild(modal);
                modal.querySelector('#cancelBtn').onclick = () => { modal.remove(); resolve(false); };
                modal.querySelector('#confirmBtn').onclick = () => { modal.remove(); resolve(true); };
            });
        }

        function promptUserPassword(message) {
            return new Promise((resolve) => {
                playSound('error');
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 bg-black bg-opacity-50 z-[200] flex items-center justify-center p-4 fade-in';
                modal.innerHTML = `
                    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm text-center border-t-4 border-red-500">
                        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-50 mb-4">
                            <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <h3 class="text-lg font-bold mb-2 text-slate-800">পাসওয়ার্ড যাচাই</h3>
                        <p class="text-sm text-slate-600 mb-4">${message}</p>
                        <input type="password" id="userPassInput" class="w-full p-2 border rounded-lg mb-2 text-center" placeholder="আপনার সাইন-আপ পাসওয়ার্ড" autofocus>
                        <p id="passError" class="text-xs text-red-500 mb-3 h-4 font-bold"></p>
                        <div class="flex gap-3">
                            <button id="confirmBtn" class="flex-1 bg-red-500 text-white p-2 rounded-lg font-bold hover:bg-red-600">যাচাই করুন</button>
                            <button id="cancelBtn" class="flex-1 bg-slate-200 text-slate-700 p-2 rounded-lg font-bold hover:bg-slate-300">বাতিল</button>
                        </div>
                    </div>`;
                document.body.appendChild(modal);
                modal.querySelector('#cancelBtn').onclick = () => { modal.remove(); resolve(false); };
                const doVerify = async () => {
                    const pass = document.getElementById('userPassInput').value;
                    const errEl = document.getElementById('passError');
                    if (!pass) { errEl.innerText = 'পাসওয়ার্ড দিন।'; return; }
                    try {
                        const credential = EmailAuthProvider.credential(auth.currentUser.email, pass);
                        await reauthenticateWithCredential(auth.currentUser, credential);
                        modal.remove(); resolve(true);
                    } catch (err) { errEl.innerText = 'পাসওয়ার্ড ভুল হয়েছে!'; }
                };
                modal.querySelector('#confirmBtn').onclick = doVerify;
                document.getElementById('userPassInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') doVerify(); });
            });
        }

        function showToast(msg, type = 'error', silent = false) {
            if (!silent) playSound(type);
            const colors = { error: 'bg-red-500', success: 'bg-green-500', info: 'bg-blue-500' };
            const toast = document.createElement('div');
            toast.className = `fixed top-5 right-5 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-xl z-[100] fade-in flex items-center`;
            toast.innerHTML = `<span>${msg}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function showSpinner(btn) { btn.disabled = true; btn.dataset.originalHtml = btn.innerHTML; btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`; }
        function hideSpinner(btn) { btn.disabled = false; btn.innerHTML = btn.dataset.originalHtml; }

        function resetIdleTimer() { clearTimeout(idleTimer); idleTimer = setTimeout(() => signOut(auth).then(() => showToast('৫ মিনিট নিষ্ক্রিয়তার কারণে লগআউট হয়েছে', 'info')), 300000); }
        ['mousemove','keydown','click','scroll'].forEach(evt => window.addEventListener(evt, resetIdleTimer));

        function cleanError(err) {
            const errors = { 'auth/invalid-email': 'ইমেইল ঠিকানাটি সঠিক নয়।', 'auth/user-not-found': 'এই ইমেইল বা ইউজারনেম দিয়ে কোনো অ্যাকাউন্ট নেই।', 'auth/wrong-password': 'পাসওয়ার্ড ভুল হয়েছে।', 'auth/email-already-in-use': 'Email already exist', 'auth/weak-password': 'পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে।', 'auth/network-request-failed': 'নেটওয়ার্ক সমস্যা!', 'permission-denied': 'অনুমতি নেই।', 'auth/invalid-credential': 'ইমেইল বা পাসওয়ার্ড ভুল হয়েছে।' };
            if (err && err.code && errors[err.code]) return errors[err.code];
            return 'কিছু একটা সমস্যা হয়েছে। আবার চেষ্টা করুন।';
        }

        onAuthStateChanged(auth, (user) => { if (user) renderDashboard(); else renderAuth(); });

        /* ===== অথেন্টিকেশন ===== */
        function renderAuth() {
            const savedIds = JSON.parse(localStorage.getItem('savedIdentifiers') || '[]');
            const optionsHtml = savedIds.map(id => `<option value="${id}">`).join('');
            appContainer.innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center bg-slate-200 p-4">
                    <div class="w-full max-w-md flex-1 flex flex-col justify-center">
                        <div class="text-center mb-8">
                            <div class="inline-block p-4 bg-white rounded-2xl shadow-lg mb-4 border border-slate-200"><svg class="w-10 h-10 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21l1.65-3.8a9 9 0 113.4 2.9L3 21"></path></svg></div>
                            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">জমি লিজ ম্যানেজমেন্ট</h1>
                            <p class="text-slate-500 mt-2 text-sm">নিরাপদ ও স্মার্ট হিসাব ব্যবস্থাপনা</p>
                        </div>
                        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                            <div class="flex border-b border-slate-200">
                                <button id="tabLogin" class="flex-1 py-4 font-bold text-white bg-slate-800 transition relative">লগইন <span class="absolute bottom-0 left-1/4 right-1/4 h-1 bg-cyan-500"></span></button>
                                <button id="tabSignup" class="flex-1 py-4 font-bold text-slate-500 hover:text-slate-800 transition">সাইন আপ</button>
                            </div>
                            <div class="p-8 space-y-6">
                                <form id="loginForm" class="space-y-5">
                                    <div><label class="block text-xs font-medium text-slate-600 mb-1">ইমেইল অথবা ইউজারনেম</label><input type="text" id="loginIdentifier" list="identifierList" autocomplete="username" class="premium-input w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 outline-none" required><datalist id="identifierList">${optionsHtml}</datalist></div>

        async function handleDataDelete() {
            let sy = parseInt(normalizeYear(document.getElementById('delStartYear').value)), ey = parseInt(normalizeYear(document.getElementById('delEndYear').value));

            if (!(await promptUserPassword('আপনার সাইন-আপ পাসওয়ার্ড দিন।'))) return;
            if (!(await customConfirm(`${sy} থেকে ${ey} সাল পর্যন্ত ডিলিট করা চাষীদের ডেটা স্থায়ীভাবে মুছে ফেলতে চান?`, "delete"))) return;
            showToast('পরীক্ষা করা হচ্ছে...', 'info');
            const snap = await getDocs(query(collection(db, "leases"), where("userId", "==", auth.currentUser.uid)));
            let dp = [], sa = 0;
            snap.forEach(d => { const data = d.data(); if (data.status !== 'deleted') { sa++; return; } let yn = parseInt(normalizeYear(data.year)); if (yn >= sy && yn <= ey) { dp.push(deleteDoc(doc(db, "leases", d.id))); } else { let yd = data.yearlyData || {}, up = false; for (let y in yd) { if (parseInt(normalizeYear(y)) >= sy && parseInt(normalizeYear(y)) <= ey) { delete yd[y]; up = true; } } if (up) dp.push(updateDoc(doc(db, "leases", d.id), { yearlyData: yd })); } });

        function loadLeases() { const q = query(collection(db, "leases"), where("userId", "==", auth.currentUser.uid)); onSnapshot(q, (snap) => { allLeases = []; snap.forEach(d => { allLeases.push({ id: d.id, ...d.data() }); }); autoRollover(); }); }

        async function autoRollover() { const cy = String(new Date().getFullYear()), cn = new Date().getFullYear(); let u = []; for (let l of allLeases) { if (justCreatedIds.has(l.id)) { justCreatedIds.delete(l.id); continue; } if (l.status !== 'active' || l.isPaused) continue; if (parseInt(normalizeYear(l.year)) >= cn) continue; const yd = { ...(l.yearlyData || {}) }; yd[l.year] = { amount: l.amount, ratePer33: l.ratePer33, totalCost: l.totalCost, paidAmount: l.paidAmount, dueAmount: l.dueAmount, cycleType: l.cycleType, isPaused: false }; const cd = l.dueAmount || 0, nt = (l.amount / 33) * l.ratePer33; u.push(updateDoc(doc(db, "leases", l.id), { year: cy, yearlyData: yd, totalCost: nt, paidAmount: 0, dueAmount: cd + nt, isPaused: false, history: [...(l.history || []), { type: 'new_year', date: new Date().toLocaleDateString('bn-BD'), fromYear: l.year, toYear: cy, carriedDue: cd }] })); } if (u.length > 0) await Promise.all(u); else renderTable(); }

                        col3 = `<div class="text-xs text-slate-600 font-semibold">${lease.year} সালের হারি: ${fmt(lease.totalCost || 0)}</div><div class="text-xs text-green-600 mt-1">জমা: ${fmt(lease.paidAmount || 0)}</div>`;
                    }

                            col4 = `<span class="font-bold text-red-600 text-xs leading-relaxed">${ys} সালের মোট বকেয়া: ${fmt(dd.totalDue)} টাকা</span>`;

                            <div class="collapsed-view"><div><span class="collapsed-name farmer-name" data-name="${lease.farmerName}">${lease.farmerName}</span><span class="collapsed-year">${lease.year} | ${lease.cycleType || ''}</span></div><span class="collapsed-amount">${isP ? '' : lease.amount + ' শতাংশ'}</span><span class="collapsed-due">${colDue}</span></div>

                        </td>
                        <td data-label="জমি / দর" class="collapsible">${col2}</td>
                        <td data-label="মোট হারি / পরিশোধিত" class="collapsible">${col3}</td>

        }

        window.goToPage = function(p) { currentPage = p; renderTable(); };

        /* ===== জমা মোডাল ===== */
        function openPaymentModal(id, name) {

                document.getElementById('paymentForm').onsubmit = async (e) => { e.preventDefault(); const sy = document.getElementById('payYear').value, amt = parseFloat(document.getElementById('payAmount').value); if (isNaN(amt) || amt <= 0) return showToast('সঠিক পরিমাণ দিন।'); const yd = { ...(lease.yearlyData || {}) }; if (!yd[sy]) return; yd[sy].paidAmount = (yd[sy].paidAmount || 0) + amt; yd[sy].dueAmount = (yd[sy].dueAmount || 0) - amt; try { await updateDoc(doc(db, "leases", id), { yearlyData: yd, history: [...(lease.history||[]), { type:'payment', date: new Date().toLocaleDateString('bn-BD'), year: sy, amount: amt }] }); document.getElementById('modalContainer').classList.add('hidden'); showToast(`${sy} সালে ${fmt(amt)} টাকা জমা সফল!`, 'success'); } catch(err) { showToast(cleanError(err)); } };
            } else {
                openModal(`<h3 class="text-lg font-bold mb-4">${name} - ${lease.year} সালের জমা</h3><form id="paymentForm" class="space-y-4"><div><label class="block text-sm font-medium mb-1">জমার পরিমাণ (টাকা)</label><input type="number" id="payAmount" class="w-full p-3 border rounded-lg" required></div><div class="flex gap-3"><button type="submit" class="flex-1 bg-green-600 text-white p-3 rounded-lg font-bold hover:bg-green-700">জমা দিন</button><button type="button" class="flex-1 bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল</button></div></form>`);
                document.getElementById('paymentForm').onsubmit = async (e) => { e.preventDefault(); const amt = parseFloat(document.getElementById('payAmount').value); if (isNaN(amt) || amt <= 0) return showToast('সঠিক পরিমাণ দিন।'); const np = (lease.paidAmount||0)+amt, nd = Math.max(0,(lease.dueAmount||0)-amt); try { await updateDoc(doc(db,"leases",id),{paidAmount:np,dueAmount:nd,history:[...(lease.history||[]),{type:'payment',date:new Date().toLocaleDateString('bn-BD'),year:lease.year,amount:amt}]}); document.getElementById('modalContainer').classList.add('hidden'); showToast('জমা সফল!','success'); } catch(err){showToast(cleanError(err));} };
            }

        /* ===== হস্তান্তর মোডাল — সাজেশন সহ ===== */
        function openTransferModal(id, amount) {
            const ef = [...new Set(allLeases.filter(l => l.id !== id && l.status !== 'deleted').map(l => l.farmerName))];
            const dl = ef.map(n => `<option value="${n}">`).join('');
            openModal(`<h3 class="text-lg font-bold mb-4">জমি হস্তান্তর</h3><form id="transferForm" class="space-y-4"><div class="text-sm text-slate-600 bg-slate-50 p-2 rounded">বর্তমান জমি: <strong>${amount}</strong> শতাংশ</div><div><label class="block text-sm font-medium mb-1">হস্তান্তরের পরিমাণ (শতাংশ)</label><input type="number" step="0.01" id="transferAmount" class="w-full p-3 border rounded-lg" max="${amount}" required></div><div><label class="block text-sm font-medium mb-1">প্রাপকের নাম</label><input type="text" id="transferTo" list="farmerSuggestion" class="w-full p-3 border rounded-lg" required><datalist id="farmerSuggestion">${dl}</datalist><p class="text-xs text-slate-400 mt-1">সাজেশন থেকে নির্বাচন বা নতুন নাম লিখুন</p></div><div class="flex gap-3"><button type="submit" class="flex-1 bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700">হস্তান্তর করুন</button><button type="button" class="flex-1 bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল</button></div></form>`);
            document.getElementById('transferForm').onsubmit = async (e) => { e.preventDefault(); const ta = parseFloat(document.getElementById('transferAmount').value), to = document.getElementById('transferTo').value.trim(), lease = allLeases.find(l=>l.id===id); if(!lease)return; if(ta<=0||ta>lease.amount)return showToast('পরিমাণ বৈধ নয়।'); if(!to)return showToast('নাম দিন।'); const na=parseFloat((lease.amount-ta).toFixed(4)),nt=(na/33)*lease.ratePer33,r=na/lease.amount,np=parseFloat(((lease.paidAmount||0)*r).toFixed(2)),nd=parseFloat(Math.max(0,nt-np).toFixed(2)); try{await updateDoc(doc(db,"leases",id),{amount:na,totalCost:nt,paidAmount:np,dueAmount:nd,history:[...(lease.history||[]),{type:'transfer_out',date:new Date().toLocaleDateString('bn-BD'),amount:ta,to}]});const rtc=(ta/33)*lease.ratePer33;const ndr=await addDoc(collection(db,"leases"),{userId:auth.currentUser.uid,farmerName:to,amount:ta,ratePer33:lease.ratePer33,totalCost:rtc,paidAmount:0,dueAmount:rtc,year:lease.year,cycleType:lease.cycleType,status:'active',isPaused:false,yearlyData:{},history:[{type:'transfer_in',date:new Date().toLocaleDateString('bn-BD'),from:lease.farmerName,amount:ta}]});justCreatedIds.add(ndr.id);document.getElementById('modalContainer').classList.add('hidden');showToast('হস্তান্তর সফল!','success');}catch(err){showToast(cleanError(err));} };
        }

        /* ===== জমা সমন্বয় — শুধু জমা টাকা এডিট ===== */
        function openAdjustPaidModal(id, name, year, paid) {
            openModal(`<h3 class="text-lg font-bold mb-4">${name} - জমা সমন্বয় (${year})</h3><form id="adjustForm" class="space-y-4"><div class="text-sm text-slate-600 bg-slate-50 p-2 rounded">বর্তমান জমা: <strong class="text-green-600">${fmt(paid)}</strong> টাকা</div><div><label class="block text-sm font-medium mb-1">নতুন জমার পরিমাণ (টাকা) — যেকোনো ভ্যালু</label><input type="number" id="newPaid" class="w-full p-3 border rounded-lg" value="${paid}" required></div><div class="flex gap-3"><button type="submit" class="flex-1 bg-purple-600 text-white p-3 rounded-lg font-bold hover:bg-purple-700">সমন্বয় করুন</button><button type="button" class="flex-1 bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল</button></div></form>`);

            };
        }

        /* ===== সফট ডিলিট — পাসওয়ার্ড সহ ===== */
        async function handleDelete(id) {
            const lease = allLeases.find(l => l.id === id); if (!lease) return;
            if (!(await promptUserPassword('তালিকা থেকে মুছে ফেলতে আপনার সাইন-আপ পাসওয়ার্ড দিন।'))) return;
            if (!(await customConfirm(`"${lease.farmerName}" কে তালিকা থেকে মুছে ফেলতে চান?`, 'delete'))) return;
            try { await updateDoc(doc(db, "leases", id), { status: 'deleted', history: [...(lease.history || []), { type: 'deleted', date: new Date().toLocaleDateString('bn-BD') }] }); showToast('তালিকা থেকে মুছে ফেলা হয়েছে।', 'success'); } catch (err) { showToast(cleanError(err)); }
        }

        /* ===== হিসাব স্থগিত/চালু ===== */
        function openManageAccountModal(id) {
            const lease = allLeases.find(l => l.id === id); if (!lease) return;
            const isP = lease.isPaused || false; const act = isP ? 'চালু' : 'স্থগিত'; const cl = isP ? 'green' : 'orange';
            openModal(`<h3 class="text-lg font-bold mb-4">হিসাব ${act} করুন</h3><div class="bg-${cl}-50 border border-${cl}-200 rounded-lg p-4 mb-4"><p class="text-sm text-slate-700"><strong>${lease.farmerName}</strong> এর ${lease.year} সালের হিসাব <strong class="text-${cl}-600">${act}</strong> করতে চান?</p>${!isP ? '<p class="text-xs text-slate-500 mt-1">স্থগিত করলে এই সালে জমা বন্ধ হবে। পূর্বের বকেয়া জমা যাবে। দর পরিবর্তন যাবে।</p>' : ''}</div><div class="flex gap-3"><button id="confirmManage" class="flex-1 bg-${cl}-600 text-white p-3 rounded-lg font-bold hover:bg-${cl}-700">${act} করুন</button><button class="flex-1 bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল</button></div>`);
            document.getElementById('confirmManage').onclick = async () => { try { await updateDoc(doc(db, "leases", id), { isPaused: !isP, history: [...(lease.history || []), { type: 'manage', date: new Date().toLocaleDateString('bn-BD'), paused: !isP }] }); document.getElementById('modalContainer').classList.add('hidden'); showToast(`হিসাব ${act} করা হয়েছে!`, 'success'); } catch (err) { showToast(cleanError(err)); } };
        }

        /* ===== ইতিহাস মোডাল ===== */
        function openHistoryModal(name) {
            const ml = allLeases.filter(l => l.farmerName === name); let ah = [];
            ml.forEach(lease => { (lease.history || []).forEach(h => { let d = ''; const yl = h.year || lease.year || ''; if (h.type === 'new') d = `নতুন হিসাব: ${h.amount} শতাংশ, দর: ${h.rate} (${yl})`; else if (h.type === 'payment') d = `${yl} সালের জমা: ${h.amount} টাকা`; else if (h.type === 'transfer_out') d = `${h.amount} শতাংশ "${h.to}" কে হস্তান্তর`; else if (h.type === 'transfer_in') d = `"${h.from}" থেকে ${h.amount} শতাংশ পেয়েছেন`; else if (h.type === 'edit') d = `দর পরিবর্তন: ${h.oldRate} → ${h.newRate} (${yl})`; else if (h.type === 'manage') d = h.paused ? `হিসাব স্থগিত (${yl})` : `হিসাব চালু (${yl})`; else if (h.type === 'new_year') d = `${h.fromYear} → ${h.toYear} সালে রোলওভার (বকেয়া: ${fmt(h.carriedDue)})`; else if (h.type === 'deleted') d = `তালিকা থেকে মুছে ফেলা (${yl})`; if (d) ah.push({ date: h.date, desc: d }); }); });
            ah.reverse();
            const html = ah.length === 0 ? '<p class="text-slate-400 text-center py-8">কোনো ইতিহাস নেই।</p>' : ah.map(h => `<div class="flex justify-between items-start py-3 border-b border-slate-100 last:border-0 gap-2"><span class="text-sm text-slate-700">${h.desc}</span><span class="text-xs text-slate-400 whitespace-nowrap flex-shrink-0">${h.date}</span></div>`).join('');
            openModal(`<h3 class="text-lg font-bold mb-1 text-slate-800">${name}</h3><p class="text-xs text-slate-400 mb-4">সম্পূর্ণ লেনদেন ইতিহাস</p><div class="max-h-96 overflow-y-auto pr-1">${html}</div><button class="w-full bg-slate-200 text-slate-700 p-2 rounded-lg font-bold hover:bg-slate-300 mt-4" onclick="document.getElementById('modalContainer').classList.add('hidden')">বন্ধ করুন</button>`);
        }
    </script>
</head>
<body>
    <div id="app" class="min-h-screen bg-slate-200 flex items-center justify-center">
        <div class="text-center">
            <div class="lds-spinner mx-auto mb-4"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
            <p class="text-slate-500 text-sm">লোড হচ্ছে...</p>
        </div>
    </div>
</body>
</html>
