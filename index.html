            if (!yearStr) return '';

            en: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December']

        let audioCtx;
        function playSound(type) {
            try {
                audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
                if (type === 'error' || type === 'delete') {
                    const playTone = (freq, start, duration) => {
                        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime + start);
                        gain.gain.setValueAtTime(0, audioCtx.currentTime + start);
                        gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + start + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + start + duration);
                        osc.start(audioCtx.currentTime + start); osc.stop(audioCtx.currentTime + start + duration);
                    };
                    playTone(440, 0, 0.2); playTone(349.23, 0.2, 0.3); 
                } else if (type === 'success') {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } else {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                }
            } catch(e) { console.error("Audio error", e); }
        }

                            <svg class="w-6 h-6 ${c.icon}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        </div>

                        <div class="flex gap-3">

                            <button id="cancelBtn" class="flex-1 bg-slate-200 text-slate-700 p-2 rounded-lg font-bold hover:bg-slate-300">বাতিল</button>
                        </div>
                    </div>`;
                document.body.appendChild(modal);
                modal.querySelector('#cancelBtn').onclick = () => { modal.remove(); resolve(false); };
                modal.querySelector('#confirmBtn').onclick = () => { modal.remove(); resolve(true); };
            });
        }

        function promptAdminPassword(message) {
            return new Promise((resolve) => {
                playSound('error');

        function showToast(msg, type = 'error', silent = false) {
            if (!silent) playSound(type);
            const colors = { error: 'bg-red-500', success: 'bg-green-500', info: 'bg-blue-500' };
            const toast = document.createElement('div');
            toast.className = `fixed top-5 right-5 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-xl z-[100] fade-in flex items-center`;
            toast.innerHTML = `<span>${msg}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function showSpinner(btn) { btn.disabled = true; btn.dataset.originalHtml = btn.innerHTML; btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`; }

        function cleanError(err) {
            const errors = { 'auth/invalid-email': 'ইমেইল ঠিকানাটি সঠিক নয়।', 'auth/user-not-found': 'এই ইমেইল বা ইউজারনেম দিয়ে কোনো অ্যাকাউন্ট নেই।', 'auth/wrong-password': 'পাসওয়ার্ড ভুল হয়েছে।', 'auth/email-already-in-use': 'Email already exist', 'auth/weak-password': 'পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে।', 'auth/network-request-failed': 'নেটওয়ার্ক সমস্যা! ইন্টারনেট সংযোগ পরীক্ষা করুন।', 'permission-denied': 'অনুমতি নেই।' };
            if (err && err.code && errors[err.code]) return errors[err.code];
            return 'কিছু একটা সমস্যা হয়েছে। আবার চেষ্টা করুন।';
        }

        function getMonthNumber(monthStr) {
            if (!monthStr) return 0;
            const m = monthStr.toLowerCase().trim();
            const map = { 'january': 0, 'february': 1, 'march': 2, 'april': 3, 'may': 4, 'june': 5, 'july': 6, 'august': 7, 'september': 8, 'october': 9, 'november': 10, 'december': 11, 'বৈশাখ': 3, 'জ্যৈষ্ঠ': 4, 'আষাঢ়': 5, 'শ্রাবণ': 6, 'ভাদ্র': 7, 'আশ্বিন': 8, 'কার্তিক': 9, 'অগ্রহায়ণ': 10, 'পৌষ': 11, 'মাঘ': 0, 'ফাল্গুন': 1, 'চৈত্র': 2, 'জানুয়ারি': 0, 'ফেব্রুয়ারি': 1, 'মার্চ': 2, 'এপ্রিল': 3, 'জুন': 5, 'জুলাই': 6, 'আগস্ট': 7, 'সেপ্টেম্বর': 8, 'অক্টোবর': 9, 'নভেম্বর': 10, 'ডিসেম্বর': 11 };
            for (let key in map) if (m.includes(key)) return map[key];
            return 0;
        }

        async function handleDataDelete() {
            let startYear = parseInt(normalizeYear(document.getElementById('delStartYear').value));
            let endYear = parseInt(normalizeYear(document.getElementById('delEndYear').value));
            
            if (isNaN(startYear) || isNaN(endYear)) return showToast('সঠিক সাল লিখুন।');
            if (startYear > endYear) return showToast('শুরুর সাল শেষের সালের চেয়ে বড় হতে পারবে না।');

            const isConfirmed = await customConfirm(`আপনি কি ${startYear} থেকে ${endYear} সাল পর্যন্ত "3D তালিকা থেকে ডিলিট করা" চাষীদের ডেটা স্থায়ীভাবে মুছে ফেলতে চান?`, "delete");
            if (!isConfirmed) return;

            showToast('ডেটা ডিলিট করা হচ্ছে...', 'info');
            
            const snap = await getDocs(collection(db, "leases"));
            let deletePromises = [];
            let skippedCount = 0;
            
            snap.forEach(d => {
                const data = d.data();
                // 3D তালিকায় থাকা সক্রিয় চাষীদের ডেটা স্কিপ করা হবে
                if (data.status !== 'deleted') {
                    skippedCount++;
                    return; 
                }
                
                let leaseYearNum = parseInt(normalizeYear(data.year));
                
                if (leaseYearNum >= startYear && leaseYearNum <= endYear) {
                    deletePromises.push(deleteDoc(doc(db, "leases", d.id)));
                } else {
                    let yearlyData = data.yearlyData || {};
                    let updated = false;
                    for (let y in yearlyData) {
                        let yNum = parseInt(normalizeYear(y));

                    }

                    }
                }
            });

            try {

                }

            } catch (err) {
                showToast(cleanError(err));
            }
        }

        async function autoRollover() {
            let currentYear = new Date().getFullYear();
            let currentMonth = new Date().getMonth();
            let updates = [];

            for (let lease of allLeases) {
                if (lease.status === 'active') {
                    let yearlyData = lease.yearlyData || {};
                    let history = lease.history || [];
                    let updated = false;

                    let cycleMonth = getMonthNumber(lease.cycleType);
                    let activeCycleYear = currentYear;
                    if (currentMonth < cycleMonth) activeCycleYear = currentYear - 1;

                    let activeYears = Object.keys(yearlyData)
                        .filter(y => yearlyData[y].status === 'active' && !yearlyData[y].isPaused)
                        .map(Number)
                        .sort((a, b) => a - b);

                    for (let i = 0; i < activeYears.length - 1; i++) {
                        let fromYear = activeYears[i];
                        let toYear = activeYears[i + 1];

                        if (toYear <= activeCycleYear) {
                            let fromData = yearlyData[fromYear];
                            let toData = yearlyData[toYear];

                            let currentDue = parseFloat(fromData.dueAmount || 0);
                            if (currentDue < 0) currentDue = 0;

                            if (currentDue > 0) {
                                let oldCarriedDueYears = fromData.carriedDueYears || '';
                                let newCarriedDueYears = oldCarriedDueYears ? `${oldCarriedDueYears}, ${fromYear}` : fromYear.toString();

                                    let existingToCarriedDue = parseFloat(toData.carriedDue || 0);
                                    let newTotal = parseFloat(toData.totalCost) + currentDue;
                                    let newDue = newTotal - parseFloat(toData.paidAmount || 0);

                                    toData.carriedDue = (existingToCarriedDue + currentDue).toFixed(2);
                                    toData.carriedDueYears = toData.carriedDueYears ? `${toData.carriedDueYears}, ${newCarriedDueYears}` : newCarriedDueYears;
                                    toData.totalCost = newTotal.toFixed(2);
                                    toData.dueAmount = newDue.toFixed(2);

                                    history.push({ date: new Date().toLocaleDateString('bn-BD'), type: 'new_year', fromYear: fromYear, toYear: toYear, carriedDue: currentDue.toFixed(2) });
                                }
                                fromData.status = 'transferred';
                                updated = true;
                            }
                        }

                    let latestActiveYear = activeYears[activeYears.length - 1];
                    if (latestActiveYear) {
                        let year = latestActiveYear;
                        while (parseInt(year) < activeCycleYear) {
                            let nextYear = (parseInt(year) + 1).toString();
                            if (yearlyData[nextYear] && yearlyData[nextYear].status === 'active') {
                                year = nextYear;
                                continue;
                            }

                            let currentDue = parseFloat(yearlyData[year].dueAmount || 0);
                            if (currentDue < 0) currentDue = 0;
                            let nextCarriedDue = currentDue;
                            let oldCarriedDueYears = yearlyData[year].carriedDueYears || '';
                            let newCarriedDueYears = nextCarriedDue > 0 ? (oldCarriedDueYears ? `${oldCarriedDueYears}, ${year}` : year) : '';

                            let amount = yearlyData[year].amount !== undefined ? parseFloat(yearlyData[year].amount) : parseFloat(lease.amount);
                            let rate = yearlyData[year].ratePer33 !== undefined ? parseFloat(yearlyData[year].ratePer33) : parseFloat(lease.ratePer33);
                            let nextCost = (amount / 33) * rate;
                            let nextTotal = nextCarriedDue + nextCost;

                            yearlyData[year].status = 'transferred';
                            yearlyData[nextYear] = {
                                ratePer33: rate, amount: amount, totalCost: nextTotal.toFixed(2), paidAmount: 0,
                                dueAmount: nextTotal.toFixed(2), status: 'active', isPaused: false,
                                carriedDue: nextCarriedDue.toFixed(2), carriedDueYears: newCarriedDueYears
                            };

                            history.push({ date: new Date().toLocaleDateString('bn-BD'), type: 'new_year', fromYear: year, toYear: nextYear, carriedDue: nextCarriedDue.toFixed(2) });
                            year = nextYear;
                            updated = true;
                        }
                    }

                    if (updated) {
                        let maxActiveYear = Math.max(...Object.keys(yearlyData).filter(y => yearlyData[y].status === 'active' || yearlyData[y].isPaused).map(Number));
                        let maxYearStr = maxActiveYear.toString();
                        let yData = yearlyData[maxYearStr];

                        lease.year = maxYearStr;
                        lease.totalCost = yData.totalCost;
                        lease.paidAmount = yData.paidAmount;
                        lease.dueAmount = yData.dueAmount;
                        lease.ratePer33 = yData.ratePer33;
                        lease.amount = yData.amount !== undefined ? yData.amount : lease.amount;

                        updates.push(updateDoc(doc(db, "leases", lease.id), {
                            year: lease.year, ratePer33: lease.ratePer33, amount: lease.amount,
                            totalCost: lease.totalCost, paidAmount: lease.paidAmount, dueAmount: lease.dueAmount,
                            history: history, yearlyData: yearlyData
                        }));
                    }
                }
            }

            if (updates.length > 0) {
                await Promise.all(updates);
                showToast(`${updates.length} টি হিসাব স্বয়ংক্রিয়ভাবে নতুন হিসাব বর্ষে আপডেট হয়েছে।`, 'info');
            }
        }

        function loadLeases() {
            const q = collection(db, "leases");
            onSnapshot(q, (snapshot) => {
                allLeases = []; 
                snapshot.forEach(d => {
                    const data = d.data();
                    if (data.status !== 'deleted') { 
                        allLeases.push({ id: d.id, ...data });
                    }
                });
                autoRollover(); 
                for (let lease of allLeases) {
                    if (lease.status === 'active') {
                        const yearlyData = lease.yearlyData || {}; let maxYear = 0;
                        for (let y in yearlyData) { if (yearlyData[y].status === 'active' || yearlyData[y].isPaused === true) { let yNum = parseInt(y); if (yNum > maxYear) maxYear = yNum; } }
                        if (maxYear > 0) {
                            let maxYearStr = maxYear.toString();
                            if (lease.year !== maxYearStr) {
                                lease.year = maxYearStr; const yData = yearlyData[maxYearStr];
                                lease.amount = yData.amount !== undefined ? yData.amount : lease.amount;
                                lease.ratePer33 = yData.ratePer33; lease.totalCost = yData.totalCost; lease.paidAmount = yData.paidAmount; lease.dueAmount = yData.dueAmount;
                            }
                        }
                    }
                }
                allLeases.sort((a, b) => { const aYear = parseInt(normalizeYear(a.year)) || 0; const bYear = parseInt(normalizeYear(b.year)) || 0; if (a.status !== b.status) return a.status === 'active' ? -1 : 1; return bYear - aYear; });
                renderTable();
            });
        }

        async function handleDataDelete() {
            let startYear = parseInt(normalizeYear(document.getElementById('delStartYear').value));
            let endYear = parseInt(normalizeYear(document.getElementById('delEndYear').value));
            
            if (isNaN(startYear) || isNaN(endYear)) return showToast('সঠিক সাল লিখুন।');
            if (startYear > endYear) return showToast('শুরুর সাল শেষের সালের চেয়ে বড় হতে পারবে না।');

            const isConfirmed = await customConfirm(`আপনি কি ${startYear} থেকে ${endYear} সাল পর্যন্ত "3D তালিকা থেকে ডিলিট করা" চাষীদের ডেটা স্থায়ীভাবে মুছে ফেলতে চান?`, "delete");
            if (!isConfirmed) return;

            showToast('ডেটা ডিলিট করা হচ্ছে...', 'info');
            
            const snap = await getDocs(collection(db, "leases"));
            let deletePromises = [];
            let skippedCount = 0;
            
            snap.forEach(d => {
                const data = d.data();
                // 3D তালিকায় থাকা সক্রিয় চাষীদের ডেটা স্কিপ করা হবে
                if (data.status !== 'deleted') {
                    skippedCount++;
                    return; 
                }
                
                let leaseYearNum = parseInt(normalizeYear(data.year));
                
                if (leaseYearNum >= startYear && leaseYearNum <= endYear) {
                    deletePromises.push(deleteDoc(doc(db, "leases", d.id)));
                } else {
                    let yearlyData = data.yearlyData || {};
                    let updated = false;
                    for (let y in yearlyData) {
                        let yNum = parseInt(normalizeYear(y));
                        if (yNum >= startYear && yNum <= endYear) {
                            delete yearlyData[y];
                            updated = true;
                        }
                    }
                    if (updated) {
                        deletePromises.push(updateDoc(doc(db, "leases", d.id), { yearlyData }));
                    }
                }
            });

            try {
                await Promise.all(deletePromises);
                let toastMsg = 'ডেটা সফলভাবে মুছে ফেলা হয়েছে।';
                if (skippedCount > 0) {
                    toastMsg += ` ${skippedCount} জন সক্রিয় চাষীর ডেটা স্কিপ করা হয়েছে।`;
                }
                showToast(toastMsg, 'success');
                document.getElementById('modalContainer').classList.add('hidden');
            } catch (err) {
                showToast(cleanError(err));
            }
        }

        async function exportData(type) {

            const snap = await getDocs(collection(db, "leases"));
            let allData = [];
            let historyData = [];
            
            snap.forEach(d => {
                const data = d.data();
                allData.push({
                    name: data.farmerName, year: data.year, amount: data.amount, rate: data.ratePer33,
                    total: data.totalCost, paid: data.paidAmount, due: data.dueAmount,
                    status: data.status === 'deleted' ? 'কার্ড থেকে ডিলিট করা' : (data.yearlyData?.[data.year]?.isPaused ? 'স্থগিত' : 'সক্রিয়')

                    let desc = '';

                    else if (h.type === 'transfer_out') desc = `${h.amount} শতাংশ ${h.to} কে হস্তান্তর`;
                    else if (h.type === 'transfer_in') desc = `${h.from} থেকে ${h.amount} শতাংশ পেয়েছেন`;
                    else if (h.type === 'edit') desc = `দর পরিবর্তন: ${h.oldRate} -> ${h.newRate}`;
                    else if (h.type === 'manage') desc = h.paused ? 'হিসাব স্থগিত' : 'হিসাব চালু`;

                    else if (h.type === 'deleted') desc = 'তালিকা থেকে মুছে ফেলা হয়েছে';
                    historyData.push({ name: data.farmerName, date: h.date, description: desc });

            if (type === 'excel') {

                })));

                })));
                XLSX.utils.book_append_sheet(wb, ws2, "বিস্তারিত ইতিহাস");
                XLSX.writeFile(wb, "জমির_হিসাব_রিপোর্ট.xlsx");
            } else if (type === 'pdf') {
                const win = window.open('', '_blank');

                allData.forEach(d => { html += `<tr><td>${d.name}</td><td>${d.year}</td><td>${d.amount}</td><td>${d.rate}</td><td>${d.total}</td><td>${d.paid}</td><td>${d.due}</td><td>${d.status}</td></tr>`; });
                html += `</table><h2>২. বিস্তারিত ইতিহাস</h2><table><tr><th>নাম</th><th>তারিখ</th><th>বিবরণ</th></tr>`;

        async function autoRollover() {
            let currentYear = new Date().getFullYear();
            let currentMonth = new Date().getMonth();
            let updates = [];

            for (let lease of allLeases) {
                if (lease.status === 'active') {
                    let yearlyData = lease.yearlyData || {};
                    let history = lease.history || [];
                    let updated = false;

                    let cycleMonth = getMonthNumber(lease.cycleType);
                    let activeCycleYear = currentYear;
                    if (currentMonth < cycleMonth) activeCycleYear = currentYear - 1;

                    let activeYears = Object.keys(yearlyData)
                        .filter(y => yearlyData[y].status === 'active' && !yearlyData[y].isPaused)
                        .map(Number)
                        .sort((a, b) => a - b);

                    for (let i = 0; i < activeYears.length - 1; i++) {
                        let fromYear = activeYears[i];
                        let toYear = activeYears[i + 1];

                        if (toYear <= activeCycleYear) {
                            let fromData = yearlyData[fromYear];
                            let toData = yearlyData[toYear];

                            let currentDue = parseFloat(fromData.dueAmount || 0);
                            if (currentDue < 0) currentDue = 0;

                            if (currentDue > 0) {
                                let oldCarriedDueYears = fromData.carriedDueYears || '';
                                let newCarriedDueYears = oldCarriedDueYears ? `${oldCarriedDueYears}, ${fromYear}` : fromYear.toString();

                                let existingToCarriedDue = parseFloat(toData.carriedDue || 0);
                                let newTotal = parseFloat(toData.totalCost) + currentDue;
                                let newDue = newTotal - parseFloat(toData.paidAmount || 0);

                                toData.carriedDue = (existingToCarriedDue + currentDue).toFixed(2);
                                toData.carriedDueYears = toData.carriedDueYears ? `${toData.carriedDueYears}, ${newCarriedDueYears}` : newCarriedDueYears;
                                toData.totalCost = newTotal.toFixed(2);
                                toData.dueAmount = newDue.toFixed(2);

                                history.push({ date: new Date().toLocaleDateString('bn-BD'), type: 'new_year', fromYear: fromYear, toYear: toYear, carriedDue: currentDue.toFixed(2) });
                            }
                            fromData.status = 'transferred';
                            updated = true;
                        }
                    }

                    let latestActiveYear = activeYears[activeYears.length - 1];
                    if (latestActiveYear) {
                        let year = latestActiveYear;
                        while (parseInt(year) < activeCycleYear) {
                            let nextYear = (parseInt(year) + 1).toString();
                            if (yearlyData[nextYear] && yearlyData[nextYear].status === 'active') {
                                year = nextYear;
                                continue;
                            }

                            let currentDue = parseFloat(yearlyData[year].dueAmount || 0);
                            if (currentDue < 0) currentDue = 0;
                            let nextCarriedDue = currentDue;
                            let oldCarriedDueYears = yearlyData[year].carriedDueYears || '';
                            let newCarriedDueYears = nextCarriedDue > 0 ? (oldCarriedDueYears ? `${oldCarriedDueYears}, ${year}` : year) : '';

                            let amount = yearlyData[year].amount !== undefined ? parseFloat(yearlyData[year].amount) : parseFloat(lease.amount);
                            let rate = yearlyData[year].ratePer33 !== undefined ? parseFloat(yearlyData[year].ratePer33) : parseFloat(lease.ratePer33);
                            let nextCost = (amount / 33) * rate;
                            let nextTotal = nextCarriedDue + nextCost;

                            yearlyData[year].status = 'transferred';
                            yearlyData[nextYear] = {
                                ratePer33: rate, amount: amount, totalCost: nextTotal.toFixed(2), paidAmount: 0,
                                dueAmount: nextTotal.toFixed(2), status: 'active', isPaused: false,
                                carriedDue: nextCarriedDue.toFixed(2), carriedDueYears: newCarriedDueYears
                            };

                            history.push({ date: new Date().toLocaleDateString('bn-BD'), type: 'new_year', fromYear: year, toYear: nextYear, carriedDue: nextCarriedDue.toFixed(2) });
                            year = nextYear;
                            updated = true;
                        }
                    }

                    if (updated) {
                        let maxActiveYear = Math.max(...Object.keys(yearlyData).filter(y => yearlyData[y].status === 'active' || yearlyData[y].isPaused).map(Number));
                        let maxYearStr = maxActiveYear.toString();
                        let yData = yearlyData[maxYearStr];

                        lease.year = maxYearStr;
                        lease.totalCost = yData.totalCost;
                        lease.paidAmount = yData.paidAmount;
                        lease.dueAmount = yData.dueAmount;
                        lease.ratePer33 = yData.ratePer33;
                        lease.amount = yData.amount !== undefined ? yData.amount : lease.amount;

                        updates.push(updateDoc(doc(db, "leases", lease.id), {
                            year: lease.year, ratePer33: lease.ratePer33, amount: lease.amount,
                            totalCost: lease.totalCost, paidAmount: lease.paidAmount, dueAmount: lease.dueAmount,
                            history: history, yearlyData: yearlyData
                        }));
                    }
                }
            }

            if (updates.length > 0) {
                await Promise.all(updates);
                showToast(`${updates.length} টি হিসাব স্বয়ংক্রিয়ভাবে নতুন হিসাব বর্ষে আপডেট হয়েছে।`, 'info');

        }

        function loadLeases() {
            const q = collection(db, "leases");
            onSnapshot(q, (snapshot) => {
                allLeases = []; 
                snapshot.forEach(d => {
                    const data = d.data();
                    if (data.status !== 'deleted') { 
                        allLeases.push({ id: d.id, ...data });
                    }
                });
                autoRollover(); 
                for (let lease of allLeases) {
                    if (lease.status === 'active') {
                        const yearlyData = lease.yearlyData || {}; let maxYear = 0;
                        for (let y in yearlyData) { if (yearlyData[y].status === 'active' || yearlyData[y].isPaused === true) { let yNum = parseInt(y); if (yNum > maxYear) maxYear = yNum; } }
                        if (maxYear > 0) {
                            let maxYearStr = maxYear.toString();
                            if (lease.year !== maxYearStr) {
                                lease.year = maxYearStr; const yData = yearlyData[maxYearStr];
                                lease.amount = yData.amount !== undefined ? yData.amount : lease.amount;
                                lease.ratePer33 = yData.ratePer33; lease.totalCost = yData.totalCost; lease.paidAmount = yData.paidAmount; lease.dueAmount = yData.dueAmount;
                            }
                        }
                    }
                }
                allLeases.sort((a, b) => { const aYear = parseInt(normalizeYear(a.year)) || 0; const bYear = parseInt(normalizeYear(b.year)) || 0; if (a.status !== b.status) return a.status === 'active' ? -1 : 1; return bYear - aYear; });
                renderTable();
            });
        }

            if (isNaN(startYear) || isNaN(endYear)) return showToast('সঠিক সাল লিখুন।');
            if (startYear > endYear) return showToast('শুরুর সাল শেষের সালের চেয়ে বড় হতে পারবে না।');

            const isConfirmed = await customConfirm(`আপনি কি ${startYear} থেকে ${endYear} সাল পর্যন্ত "3D তালিকা থেকে ডিলিট করা" চাষীদের ডেটা স্থায়ীভাবে মুছে ফেলতে চান?`, "delete");
            if (!isConfirmed) return;

            showToast('ডেটা ডিলিট করা হচ্ছে...', 'info');
            
            const snap = await getDocs(collection(db, "leases"));
            let deletePromises = [];
            let skippedCount = 0;
            
            snap.forEach(d => {
                const data = d.data();
                // 3D তালিকায় থাকা সক্রিয় চাষীদের ডেটা স্কিপ করা হবে
                if (data.status !== 'deleted') {
                    skippedCount++;
                    return; 
                }
                
                let leaseYearNum = parseInt(normalizeYear(data.year));
                
                if (leaseYearNum >= startYear && leaseYearNum <= endYear) {
                    deletePromises.push(deleteDoc(doc(db, "leases", d.id)));
                } else {
                    let yearlyData = data.yearlyData || {};
                    let updated = false;
                    for (let y in yearlyData) {
                        let yNum = parseInt(normalizeYear(y));
                        if (yNum >= startYear && yNum <= endYear) {
                            delete yearlyData[y];
                            updated = true;
                        }
                    }
                    if (updated) {
                        deletePromises.push(updateDoc(doc(db, "leases", d.id), { yearlyData }));
                    }
                }
            });

            try {
                await Promise.all(deletePromises);
                let toastMsg = 'ডেটা সফলভাবে মুছে ফেলা হয়েছে।';
                if (skippedCount > 0) {
                    toastMsg += ` ${skippedCount} জন সক্রিয় চাষীর ডেটা স্কিপ করা হয়েছে।`;
                }
                showToast(toastMsg, 'success');
                document.getElementById('modalContainer').classList.add('hidden');
            } catch (err) {
                showToast(cleanError(err));
            }
        }

        async function autoRollover() {
            let currentYear = new Date().getFullYear();
            let currentMonth = new Date().getMonth();
            let updates = [];

            for (let lease of allLeases) {
                if (lease.status === 'active') {
                    let yearlyData = lease.yearlyData || {};
                    let history = lease.history || [];
                    let updated = false;

                    let cycleMonth = getMonthNumber(lease.cycleType);
                    let activeCycleYear = currentYear;
                    if (currentMonth < cycleMonth) activeCycleYear = currentYear - 1;

                    let activeYears = Object.keys(yearlyData)
                        .filter(y => yearlyData[y].status === 'active' && !yearlyData[y].isPaused)
                        .map(Number)
                        .sort((a, b) => a - b);

                    for (let i = 0; i < activeYears.length - 1; i++) {
                        let fromYear = activeYears[i];
                        let toYear = activeYears[i + 1];

                        if (toYear <= activeCycleYear) {
                            let fromData = yearlyData[fromYear];
                            let toData = yearlyData[toYear];

                            let currentDue = parseFloat(fromData.dueAmount || 0);
                            if (currentDue < 0) currentDue = 0;

                            if (currentDue > 0) {
                                let oldCarriedDueYears = fromData.carriedDueYears || '';
                                let newCarriedDueYears = oldCarriedDueYears ? `${oldCarriedDueYears}, ${fromYear}` : fromYear.toString();

                                let existingToCarriedDue = parseFloat(toData.carriedDue || 0);
                                let newTotal = parseFloat(toData.totalCost) + currentDue;
                                let newDue = newTotal - parseFloat(toData.paidAmount || 0);

                                toData.carriedDue = (existingToCarriedDue + currentDue).toFixed(2);
                                toData.carriedDueYears = toData.carriedDueYears ? `${toData.carriedDueYears}, ${newCarriedDueYears}` : newCarriedDueYears;
                                toData.totalCost = newTotal.toFixed(2);
                                toData.dueAmount = newDue.toFixed(2);

                                history.push({ date: new Date().toLocaleDateString('bn-BD'), type: 'new_year', fromYear: fromYear, toYear: toYear, carriedDue: currentDue.toFixed(2) });
                            }
                            fromData.status = 'transferred';
                            updated = true;
                        }
                    }

                    let latestActiveYear = activeYears[activeYears.length - 1];
                    if (latestActiveYear) {
                        let year = latestActiveYear;
                        while (parseInt(year) < activeCycleYear) {
                            let nextYear = (parseInt(year) + 1).toString();
                            if (yearlyData[nextYear] && yearlyData[nextYear].status === 'active') {
                                year = nextYear;
                                continue;
                            }

                            let currentDue = parseFloat(yearlyData[year].dueAmount || 0);
                            if (currentDue < 0) currentDue = 0;
                            let nextCarriedDue = currentDue;
                            let oldCarriedDueYears = yearlyData[year].carriedDueYears || '';
                            let newCarriedDueYears = nextCarriedDue > 0 ? (oldCarriedDueYears ? `${oldCarriedDueYears}, ${year}` : year) : '';

                            let amount = yearlyData[year].amount !== undefined ? parseFloat(yearlyData[year].amount) : parseFloat(lease.amount);
                            let rate = yearlyData[year].ratePer33 !== undefined ? parseFloat(yearlyData[year].ratePer33) : parseFloat(lease.ratePer33);
                            let nextCost = (amount / 33) * rate;
                            let nextTotal = nextCarriedDue + nextCost;

                            yearlyData[year].status = 'transferred';
                            yearlyData[nextYear] = {
                                ratePer33: rate, amount: amount, totalCost: nextTotal.toFixed(2), paidAmount: 0,
                                dueAmount: nextTotal.toFixed(2), status: 'active', isPaused: false,
                                carriedDue: nextCarriedDue.toFixed(2), carriedDueYears: newCarriedDueYears
                            };

                            history.push({ date: new Date().toLocaleDateString('bn-BD'), type: 'new_year', fromYear: year, toYear: nextYear, carriedDue: nextCarriedDue.toFixed(2) });
                            year = nextYear;
                            updated = true;
                        }
                    }

                    if (updated) {
                        let maxActiveYear = Math.max(...Object.keys(yearlyData).filter(y => yearlyData[y].status === 'active' || yearlyData[y].isPaused).map(Number));
                        let maxYearStr = maxActiveYear.toString();
                        let yData = yearlyData[maxYearStr];

                        lease.year = maxYearStr;
                        lease.totalCost = yData.totalCost;
                        lease.paidAmount = yData.paidAmount;
                        lease.dueAmount = yData.dueAmount;
                        lease.ratePer33 = yData.ratePer33;
                        lease.amount = yData.amount !== undefined ? yData.amount : lease.amount;

                        updates.push(updateDoc(doc(db, "leases", lease.id), {
                            year: lease.year, ratePer33: lease.ratePer33, amount: lease.amount,
                            totalCost: lease.totalCost, paidAmount: lease.paidAmount, dueAmount: lease.dueAmount,
                            history: history, yearlyData: yearlyData
                        }));
                    }
                }
            }

            if (updates.length > 0) {
                await Promise.all(updates);
                showToast(`${updates.length} টি হিসাব স্বয়ংক্রিয়ভাবে নতুন হিসাব বর্ষে আপডেট হয়েছে।`, 'info');
            }
        }

        function loadLeases() {
            const q = collection(db, "leases");
            onSnapshot(q, (snapshot) => {
                allLeases = []; 
                snapshot.forEach(d => {
                    const data = d.data();
                    if (data.status !== 'deleted') { 
                        allLeases.push({ id: d.id, ...data });
                    }
                });
                autoRollover(); 
                for (let lease of allLeases) {
                    if (lease.status === 'active') {
                        const yearlyData = lease.yearlyData || {}; let maxYear = 0;
                        for (let y in yearlyData) { if (yearlyData[y].status === 'active' || yearlyData[y].isPaused === true) { let yNum = parseInt(y); if (yNum > maxYear) maxYear = yNum; } }
                        if (maxYear > 0) {
                            let maxYearStr = maxYear.toString();
                            if (lease.year !== maxYearStr) {
                                lease.year = maxYearStr; const yData = yearlyData[maxYearStr];
                                lease.amount = yData.amount !== undefined ? yData.amount : lease.amount;
                                lease.ratePer33 = yData.ratePer33; lease.totalCost = yData.totalCost; lease.paidAmount = yData.paidAmount; lease.dueAmount = yData.dueAmount;
                            }
                        }
                    }
                }
                allLeases.sort((a, b) => { const aYear = parseInt(normalizeYear(a.year)) || 0; const bYear = parseInt(normalizeYear(b.year)) || 0; if (a.status !== b.status) return a.status === 'active' ? -1 : 1; return bYear - aYear; });
                renderTable();
            });
        }

                        </div>
                    </td>`;
                tbody.appendChild(tr);
            });

            paginationDiv.innerHTML = '';
            if (totalPages > 1) {
                const prevBtn = document.createElement('button'); prevBtn.innerHTML = 'পূর্ববর্তী'; prevBtn.className = 'px-3 py-1 bg-slate-200 rounded hover:bg-slate-300 text-sm'; prevBtn.disabled = currentPage === 1; prevBtn.onclick = () => { currentPage--; renderTable(); }; paginationDiv.appendChild(prevBtn);
                const pageText = document.createElement('span'); pageText.className = 'text-sm text-slate-600'; pageText.innerText = `পেজ ${currentPage} / ${totalPages}`; paginationDiv.appendChild(pageText);
                const nextBtn = document.createElement('button'); nextBtn.innerHTML = 'পরবর্তী'; nextBtn.className = 'px-3 py-1 bg-slate-200 rounded hover:bg-slate-300 text-sm'; nextBtn.disabled = currentPage === totalPages; nextBtn.onclick = () => { currentPage++; renderTable(); }; paginationDiv.appendChild(nextBtn);
            }
        }

        function openAddLeaseModal() {
            const populateMonths = (lang) => { const cycleSelect = document.getElementById('cycleType'); cycleSelect.innerHTML = monthNames[lang].map(m => `<option value="${m}">${m}</option>`).join(''); };
            
            openModal(`
                <h3 class="text-lg font-bold mb-4 text-slate-800">নতুন চাষের হিসাব যুক্ত করুন</h3>
                <form id="leaseForm" class="space-y-4">
                    <div><input type="text" id="farmerName" placeholder="চাষীর নাম" class="w-full p-3 border rounded-lg" required></div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" step="0.01" id="amount" placeholder="জমির পরিমাণ (শতাংশ)" class="p-3 border rounded-lg" required>
                        <input type="number" id="ratePer33" placeholder="দর (যেমন: ১৮০০০)" class="p-3 border rounded-lg" required>
                    </div>
                    <div class="flex gap-2">
                        <select id="monthLang" class="p-3 border rounded-lg bg-white w-1/3"><option value="bn">বাংলা</option><option value="en">English</option></select>
                        <select id="cycleType" class="p-3 border rounded-lg bg-white w-2/3" required></select>
                    </div>
                    <div><input type="text" id="year" placeholder="বছর (২০২৫)" class="w-full p-3 border rounded-lg" required></div>
                    <div class="flex gap-3 pt-2">
                        <button type="submit" class="flex-1 bg-indigo-600 text-white p-3 rounded-lg font-bold hover:bg-indigo-700 flex justify-center">যুক্ত করুন</button>
                        <button type="button" class="flex-1 bg-slate-200 text-slate-700 p-3 rounded-lg font-bold hover:bg-slate-300" onclick="document.getElementById('modalContainer').classList.add('hidden')">বাতিল করুন</button>
                    </div>
                </form>
            `);

            populateMonths('bn');
            document.getElementById('monthLang').addEventListener('change', (e) => populateMonths(e.target.value));
            document.getElementById('leaseForm').addEventListener('submit', addLease);
        }
